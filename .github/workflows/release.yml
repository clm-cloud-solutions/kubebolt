name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write          # Required for Cosign keyless signing
  security-events: write   # Required to upload Trivy SARIF to code scanning

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web

jobs:
  # Pre-flight gate: scan every third-party image the release ships
  # (today: VictoriaMetrics) BEFORE wasting 20+ minutes building our
  # own. Fails on HIGH/CRITICAL with --ignore-unfixed so we don't
  # block on CVEs without an upstream fix. v1.8.0 went out with a
  # vulnerable VM pin — this gate exists so that never repeats.
  preflight-third-party-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Single source of truth for VM tag is deploy/helm/kubebolt/values.yaml.
      # docker-compose.yml MUST stay aligned (renovate.json groups them).
      # The vmagent sidecar pin lives in deploy/helm/kubebolt-agent/values.yaml
      # and tracks the same VM line — kept in lockstep so a CVE patch on the
      # VM line covers both binaries (they're built from the same source tree).
      - name: Extract pinned VictoriaMetrics tag from values.yaml
        id: vm
        run: |
          TAG=$(awk '/repository: victoriametrics\/victoria-metrics/{getline; print $2}' deploy/helm/kubebolt/values.yaml)
          if [ -z "$TAG" ]; then
            echo "::error::Could not parse VictoriaMetrics tag from values.yaml"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Pinned VictoriaMetrics tag: $TAG"

      - name: Extract pinned vmagent tag from kubebolt-agent values.yaml
        id: vmagent
        run: |
          # Grab the next `tag:` line after the vmagent repository line.
          # Robust to any number of intervening comments — we don't pin
          # the exact line offset because the comment block evolves.
          TAG=$(grep -A20 "repository: victoriametrics/vmagent" deploy/helm/kubebolt-agent/values.yaml \
                 | grep -m1 '^\s*tag:' \
                 | awk '{print $2}')
          if [ -z "$TAG" ]; then
            echo "::error::Could not parse vmagent tag from kubebolt-agent/values.yaml"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Pinned vmagent tag: $TAG"

      - name: Verify compose pin matches helm values pin
        run: |
          HELM_TAG="${{ steps.vm.outputs.tag }}"
          COMPOSE_TAG=$(grep -oP 'victoriametrics/victoria-metrics:\K[^ ]+' deploy/docker-compose.yml | head -1)
          if [ "$HELM_TAG" != "$COMPOSE_TAG" ]; then
            echo "::error::VictoriaMetrics tag drift — helm=$HELM_TAG compose=$COMPOSE_TAG. Bump both."
            exit 1
          fi

      - name: Verify vmagent pin tracks VictoriaMetrics pin
        run: |
          VM_TAG="${{ steps.vm.outputs.tag }}"
          VMAGENT_TAG="${{ steps.vmagent.outputs.tag }}"
          if [ "$VM_TAG" != "$VMAGENT_TAG" ]; then
            echo "::error::vmagent vs VictoriaMetrics tag drift — vmagent=$VMAGENT_TAG vm=$VM_TAG. Both must track the same VM release line (built from the same source tree, share Go stdlib CVEs)."
            exit 1
          fi

      - name: Trivy scan VictoriaMetrics image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: docker.io/victoriametrics/victoria-metrics:${{ steps.vm.outputs.tag }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'

      - name: Trivy scan vmagent image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: docker.io/victoriametrics/vmagent:${{ steps.vmagent.outputs.tag }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'

      - name: Trivy scan VictoriaMetrics image (SARIF for code scanning)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: docker.io/victoriametrics/victoria-metrics:${{ steps.vm.outputs.tag }}
          format: sarif
          output: trivy-vm.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'

      - name: Trivy scan vmagent image (SARIF for code scanning)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: docker.io/victoriametrics/vmagent:${{ steps.vmagent.outputs.tag }}
          format: sarif
          output: trivy-vmagent.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'

      - name: Upload VictoriaMetrics SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-vm.sarif
          category: trivy-victoriametrics

      - name: Upload vmagent SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-vmagent.sarif
          category: trivy-vmagent

  build-api:
    needs: preflight-third-party-scan
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      # Build context must be the repo root so the Dockerfile can pick up
      # both apps/api and packages/proto (apps/api/go.mod has a replace
      # directive into ../../packages/proto). Dockerfile is referenced
      # explicitly via `file:` since the context is no longer the
      # Dockerfile's directory.
      - uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        run: cosign sign --yes ${{ env.API_IMAGE }}@${{ steps.build.outputs.digest }}

  build-web:
    needs: preflight-third-party-scan
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v5
        id: build
        with:
          context: apps/web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        run: cosign sign --yes ${{ env.WEB_IMAGE }}@${{ steps.build.outputs.digest }}

  # Post-build gate: scan the immutable digests of the images we just
  # pushed. Failure here prevents publish-chart and the GitHub Release
  # from being created. The images themselves remain on GHCR (the push
  # already happened) — see docs/RELEASE.md for the cleanup procedure
  # if you need to retract a tag. Scanning by @sha256 digest (not by
  # tag) guarantees we audit the exact bits that would ship.
  image-scan:
    needs: [build-api, build-web, build-single-container]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan API image (by digest)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.API_IMAGE }}@${{ needs.build-api.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'

      - name: Trivy scan Web image (by digest)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.WEB_IMAGE }}@${{ needs.build-web.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'

      - name: Trivy scan single-container image (by digest)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ needs.build-single-container.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'

      # SARIF outputs run with continue-on-error so a HIGH/CRITICAL
      # in the previous gating steps still fails the job, but we
      # always upload the report to code scanning for visibility.
      - name: Trivy SARIF — API
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.API_IMAGE }}@${{ needs.build-api.outputs.digest }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'

      - name: Trivy SARIF — Web
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.WEB_IMAGE }}@${{ needs.build-web.outputs.digest }}
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'

      - name: Trivy SARIF — single-container
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ needs.build-single-container.outputs.digest }}
          format: sarif
          output: trivy-single.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'

      # GitHub Code Scanning rejects multiple SARIF runs sharing a category
      # (change rolled out 2025-07-21), so each image uploads under its own.
      - name: Upload Trivy SARIF — API
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
          category: trivy-release-api

      - name: Upload Trivy SARIF — Web
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-web.sarif
          category: trivy-release-web

      - name: Upload Trivy SARIF — single-container
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-single.sarif
          category: trivy-release-single

      # CycloneDX SBOM per image — attached to the GitHub Release so
      # downstream consumers and SBOM-driven scanners (e.g. Dependency
      # Track) can ingest the exact composition we shipped.
      - name: Trivy SBOM — API
        if: success()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.API_IMAGE }}@${{ needs.build-api.outputs.digest }}
          format: cyclonedx
          output: sbom-api.cdx.json
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'

      - name: Trivy SBOM — Web
        if: success()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.WEB_IMAGE }}@${{ needs.build-web.outputs.digest }}
          format: cyclonedx
          output: sbom-web.cdx.json
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'

      - name: Trivy SBOM — single-container
        if: success()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ needs.build-single-container.outputs.digest }}
          format: cyclonedx
          output: sbom-single.cdx.json
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'

      - name: Upload SBOM artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: sbom-*.cdx.json
          retention-days: 30

  publish-chart:
    # The Helm chart references the api + web images at the same
    # version, so don't publish a chart pointing at an image that
    # never built. Without this gate a failed build-api leaves a
    # broken `helm install --version <X>` until the chart is manually
    # cleaned up (chart 1.6.0 RC was the trigger that surfaced this).
    # image-scan also gates here so we never publish a chart that
    # pulls a vulnerable image at install time.
    needs: [build-api, build-web, image-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update chart version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: $VERSION/" deploy/helm/kubebolt/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" deploy/helm/kubebolt/Chart.yaml

      - name: Package and push chart
        id: chart
        run: |
          helm package deploy/helm/kubebolt
          CHART_TGZ=$(ls kubebolt-*.tgz)
          helm push $CHART_TGZ oci://ghcr.io/${{ github.repository }}/helm
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Push Artifact Hub metadata via ORAS
        run: |
          curl -sLO https://github.com/oras-project/oras/releases/download/v1.2.2/oras_1.2.2_linux_amd64.tar.gz
          tar xzf oras_1.2.2_linux_amd64.tar.gz oras
          echo "${{ secrets.GITHUB_TOKEN }}" | ./oras login ghcr.io -u ${{ github.actor }} --password-stdin
          ./oras push \
            ghcr.io/${{ github.repository }}/helm/kubebolt:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            deploy/helm/kubebolt/artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GHCR for Cosign
        run: echo "${{ secrets.GITHUB_TOKEN }}" | cosign login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Sign chart with Cosign
        run: cosign sign --yes ghcr.io/${{ github.repository }}/helm/kubebolt:${{ steps.chart.outputs.version }}

  build-binaries:
    needs: preflight-third-party-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Pin to explicit patch version, not floating '1.25'. The floating
          # spec lets the runner reuse a stale cached toolchain — rc.2 cut
          # initially shipped binaries compiled against 1.25.9 (which carries
          # 5 HIGH stdlib CVEs: CVE-2026-33811 / -33814 / -39820 / -39836 /
          # -42499) because the runner had 1.25.9 in its tool cache and
          # setup-go picked it instead of the newer 1.25.10 available
          # upstream. Pinning explicitly forces setup-go to fetch the
          # patched toolchain regardless of cache contents. Bump in lockstep
          # with apps/api/Dockerfile's FROM golang: pin.
          go-version: '1.25.10'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync frontend version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # src/version.ts is the single source of truth the UI
          # chrome (sidebar / login footer) reads at build time.
          # Keep it and package.json aligned with the git tag so the
          # bundled binary never ships a stale version string.
          sed -i "s/^export const VERSION = .*/export const VERSION = '$VERSION'/" apps/web/src/version.ts
          sed -i "s/^  \"version\": \".*\",/  \"version\": \"$VERSION\",/" apps/web/package.json

      - name: Build frontend
        run: |
          cd apps/web
          npm ci
          npm run build

      - name: Embed frontend into API
        run: |
          mkdir -p apps/api/cmd/server/web/dist
          cp -r apps/web/dist/. apps/api/cmd/server/web/dist/
          ls -la apps/api/cmd/server/web/dist/

      - name: Cross-compile binaries
        run: |
          mkdir -p dist
          VERSION="${{ github.ref_name }}"
          for target in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64 windows-amd64; do
            GOOS="${target%-*}"
            GOARCH="${target#*-}"
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            OUT="dist/kubebolt-${target}${EXT}"
            echo "Building $OUT..."
            cd apps/api
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
              go build -ldflags="-s -w -X main.version=${VERSION}" \
              -o "../../${OUT}" ./cmd/server/
            cd ../..
          done

      - name: Package binaries for krew (kubectl-kubebolt)
        run: |
          cd dist
          # krew expects the binary named 'kubectl-kubebolt' inside the archive
          for target in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            cp "kubebolt-${target}" kubectl-kubebolt
            tar czf "kubebolt-${target}.tar.gz" kubectl-kubebolt
            rm kubectl-kubebolt
          done
          # Windows: zip with .exe extension
          cp kubebolt-windows-amd64.exe kubectl-kubebolt.exe
          zip kubebolt-windows-amd64.zip kubectl-kubebolt.exe
          rm kubectl-kubebolt.exe

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum kubebolt-* > CHECKSUMS.txt
          cat CHECKSUMS.txt

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
          retention-days: 1

  build-single-container:
    needs: build-binaries
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries artifact
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: deploy/Dockerfile.single
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BINARY_DIR=dist

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

  update-krew-index:
    needs: build-binaries
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.fork }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries artifact
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Compute SHA256 checksums
        id: sha
        run: |
          cd dist
          echo "darwin_arm64=$(sha256sum kubebolt-darwin-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "darwin_amd64=$(sha256sum kubebolt-darwin-amd64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(sha256sum kubebolt-linux-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_amd64=$(sha256sum kubebolt-linux-amd64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "windows_amd64=$(sha256sum kubebolt-windows-amd64.zip | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update krew index
        env:
          KREW_INDEX_TOKEN: ${{ secrets.KREW_INDEX_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          if [ -z "$KREW_INDEX_TOKEN" ]; then
            echo "KREW_INDEX_TOKEN not set — skipping custom krew index update"
            exit 0
          fi

          VER="${VERSION#v}"

          git clone https://x-access-token:${KREW_INDEX_TOKEN}@github.com/clm-cloud-solutions/krew-index.git index
          cd index
          mkdir -p plugins

          sed \
            -e "s|__VERSION__|${VER}|g" \
            -e "s|__SHA_DARWIN_ARM64_TGZ__|${{ steps.sha.outputs.darwin_arm64 }}|g" \
            -e "s|__SHA_DARWIN_AMD64_TGZ__|${{ steps.sha.outputs.darwin_amd64 }}|g" \
            -e "s|__SHA_LINUX_ARM64_TGZ__|${{ steps.sha.outputs.linux_arm64 }}|g" \
            -e "s|__SHA_LINUX_AMD64_TGZ__|${{ steps.sha.outputs.linux_amd64 }}|g" \
            -e "s|__SHA_WINDOWS_AMD64_ZIP__|${{ steps.sha.outputs.windows_amd64 }}|g" \
            ../deploy/krew/kubebolt.yaml.template > plugins/kubebolt.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/kubebolt.yaml
          if git diff --cached --quiet; then
            echo "No changes to plugin manifest"
          else
            git commit -m "kubebolt ${VER}"
            git push
          fi

  update-homebrew-tap:
    needs: build-binaries
    runs-on: ubuntu-latest
    # Skip if HOMEBREW_TAP_TOKEN secret is not configured
    if: ${{ !github.event.repository.fork }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries artifact
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Compute SHA256 checksums
        id: sha
        run: |
          cd dist
          echo "darwin_arm64=$(sha256sum kubebolt-darwin-arm64 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "darwin_amd64=$(sha256sum kubebolt-darwin-amd64 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(sha256sum kubebolt-linux-arm64 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_amd64=$(sha256sum kubebolt-linux-amd64 | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap update"
            exit 0
          fi

          # Strip v prefix for version
          VER="${VERSION#v}"

          # Clone the tap repo
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/clm-cloud-solutions/homebrew-tap.git tap
          cd tap
          mkdir -p Formula

          # Render template with actual values
          sed \
            -e "s|__VERSION__|${VER}|g" \
            -e "s|__SHA_DARWIN_ARM64__|${{ steps.sha.outputs.darwin_arm64 }}|g" \
            -e "s|__SHA_DARWIN_AMD64__|${{ steps.sha.outputs.darwin_amd64 }}|g" \
            -e "s|__SHA_LINUX_ARM64__|${{ steps.sha.outputs.linux_arm64 }}|g" \
            -e "s|__SHA_LINUX_AMD64__|${{ steps.sha.outputs.linux_amd64 }}|g" \
            ../deploy/homebrew/kubebolt.rb.template > Formula/kubebolt.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kubebolt.rb
          if git diff --cached --quiet; then
            echo "No changes to formula"
          else
            git commit -m "kubebolt ${VER}"
            git push
          fi

  release:
    needs: [build-api, build-web, publish-chart, build-binaries, build-single-container, image-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binaries artifact
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sboms
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-decorate)
          else
            COMMITS=$(git log --oneline --no-decorate ${PREV_TAG}..HEAD)
          fi

          FEATURES=""
          FIXES=""
          DOCS=""
          PERF=""
          OTHER=""

          while IFS= read -r line; do
            hash=$(echo "$line" | cut -d' ' -f1)
            msg=$(echo "$line" | cut -d' ' -f2-)
            entry="- $msg (\`$hash\`)"
            case "$msg" in
              feat:*|feat\(*) FEATURES="$FEATURES
          $entry" ;;
              fix:*|fix\(*|Fix:*|Fix\ *) FIXES="$FIXES
          $entry" ;;
              docs:*|docs\(*) DOCS="$DOCS
          $entry" ;;
              perf:*|perf\(*) PERF="$PERF
          $entry" ;;
              UI:*) FEATURES="$FEATURES
          $entry" ;;
              revert:*) FIXES="$FIXES
          $entry" ;;
              *) OTHER="$OTHER
          $entry" ;;
            esac
          done <<< "$COMMITS"

          BODY=""
          [ -n "$FEATURES" ] && BODY="$BODY
          ### Features
          $FEATURES
          "
          [ -n "$FIXES" ] && BODY="$BODY
          ### Fixes
          $FIXES
          "
          [ -n "$PERF" ] && BODY="$BODY
          ### Performance
          $PERF
          "
          [ -n "$DOCS" ] && BODY="$BODY
          ### Documentation
          $DOCS
          "
          [ -n "$OTHER" ] && BODY="$BODY
          ### Other
          $OTHER
          "

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          # Auto-mark pre-releases so the tag doesn't claim "Latest release"
          # on the repo front page. Any semver suffix triggers it.
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            dist/kubebolt-linux-amd64
            dist/kubebolt-linux-arm64
            dist/kubebolt-darwin-amd64
            dist/kubebolt-darwin-arm64
            dist/kubebolt-windows-amd64.exe
            dist/kubebolt-linux-amd64.tar.gz
            dist/kubebolt-linux-arm64.tar.gz
            dist/kubebolt-darwin-amd64.tar.gz
            dist/kubebolt-darwin-arm64.tar.gz
            dist/kubebolt-windows-amd64.zip
            dist/CHECKSUMS.txt
            dist/sbom-api.cdx.json
            dist/sbom-web.cdx.json
            dist/sbom-single.cdx.json
          body: |
            ## Install

            ### Helm (recommended for Kubernetes)
            ```bash
            helm install kubebolt oci://ghcr.io/clm-cloud-solutions/kubebolt/helm/kubebolt
            kubectl port-forward svc/kubebolt 3000:80
            ```

            ### Single Binary (download below)
            ```bash
            # macOS Apple Silicon
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/kubebolt-darwin-arm64
            chmod +x kubebolt-darwin-arm64 && mv kubebolt-darwin-arm64 /usr/local/bin/kubebolt

            # Linux amd64
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/kubebolt-linux-amd64
            chmod +x kubebolt-linux-amd64 && sudo mv kubebolt-linux-amd64 /usr/local/bin/kubebolt

            kubebolt --kubeconfig ~/.kube/config
            ```

            All platform binaries are attached below. Verify with `sha256sum -c CHECKSUMS.txt`.

            ### Docker (single container)
            ```bash
            docker run -p 3000:3000 -v ~/.kube:/root/.kube:ro \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Homebrew (macOS, Linux)
            ```bash
            brew install clm-cloud-solutions/tap/kubebolt
            ```

            ### kubectl krew plugin
            ```bash
            kubectl krew index add clm https://github.com/clm-cloud-solutions/krew-index.git
            kubectl krew install clm/kubebolt
            kubectl kubebolt
            ```

            ### Docker Compose
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd kubebolt/deploy && docker compose up -d
            ```

            ### Container Images
            - Single container (binary + frontend): `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
            - API only: `${{ env.API_IMAGE }}:${{ github.ref_name }}`
            - Web only: `${{ env.WEB_IMAGE }}:${{ github.ref_name }}`

            ## Changelog
            ${{ steps.changelog.outputs.body }}
