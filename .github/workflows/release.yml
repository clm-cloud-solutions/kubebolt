name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write  # Required for Cosign keyless signing

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v5
        id: build
        with:
          context: apps/api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        run: cosign sign --yes ${{ env.API_IMAGE }}@${{ steps.build.outputs.digest }}

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v5
        id: build
        with:
          context: apps/web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        run: cosign sign --yes ${{ env.WEB_IMAGE }}@${{ steps.build.outputs.digest }}

  publish-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update chart version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: $VERSION/" deploy/helm/kubebolt/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" deploy/helm/kubebolt/Chart.yaml

      - name: Package and push chart
        id: chart
        run: |
          helm package deploy/helm/kubebolt
          CHART_TGZ=$(ls kubebolt-*.tgz)
          helm push $CHART_TGZ oci://ghcr.io/${{ github.repository }}/helm
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign chart with Cosign
        run: cosign sign --yes ghcr.io/${{ github.repository }}/helm/kubebolt:${{ steps.chart.outputs.version }}

  release:
    needs: [build-api, build-web, publish-chart]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-decorate)
          else
            COMMITS=$(git log --oneline --no-decorate ${PREV_TAG}..HEAD)
          fi

          FEATURES=""
          FIXES=""
          DOCS=""
          PERF=""
          OTHER=""

          while IFS= read -r line; do
            hash=$(echo "$line" | cut -d' ' -f1)
            msg=$(echo "$line" | cut -d' ' -f2-)
            entry="- $msg (\`$hash\`)"
            case "$msg" in
              feat:*|feat\(*) FEATURES="$FEATURES
          $entry" ;;
              fix:*|fix\(*|Fix:*|Fix\ *) FIXES="$FIXES
          $entry" ;;
              docs:*|docs\(*) DOCS="$DOCS
          $entry" ;;
              perf:*|perf\(*) PERF="$PERF
          $entry" ;;
              UI:*) FEATURES="$FEATURES
          $entry" ;;
              revert:*) FIXES="$FIXES
          $entry" ;;
              *) OTHER="$OTHER
          $entry" ;;
            esac
          done <<< "$COMMITS"

          BODY=""
          [ -n "$FEATURES" ] && BODY="$BODY
          ### Features
          $FEATURES
          "
          [ -n "$FIXES" ] && BODY="$BODY
          ### Fixes
          $FIXES
          "
          [ -n "$PERF" ] && BODY="$BODY
          ### Performance
          $PERF
          "
          [ -n "$DOCS" ] && BODY="$BODY
          ### Documentation
          $DOCS
          "
          [ -n "$OTHER" ] && BODY="$BODY
          ### Other
          $OTHER
          "

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Container Images

            ```bash
            docker pull ${{ env.API_IMAGE }}:${{ github.ref_name }}
            docker pull ${{ env.WEB_IMAGE }}:${{ github.ref_name }}
            ```

            ## Install

            **Helm:**
            ```bash
            helm install kubebolt oci://ghcr.io/clm-cloud-solutions/kubebolt/helm/kubebolt
            ```

            **Docker Compose:**
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd kubebolt/deploy && docker compose up -d
            ```

            ## Changelog
            ${{ steps.changelog.outputs.body }}
