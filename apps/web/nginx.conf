# Conditional WS upgrade for the /pf/ reverse-proxy: forwarded HTTP UIs
# (Grafana, Argo, etc.) often use WebSockets/SSE for live features. The map
# passes "upgrade" only on real WS requests and stays empty otherwise so
# plain HTTP keeps using keep-alive.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # Security: deny dotfiles + common reconnaissance paths before any
    # other matcher kicks in. Discovered session 11-A v3 2026-05-28:
    # Certificate Transparency monitors picked up our new Let's
    # Encrypt cert within hours, and automated scanners
    # (45.88.138.44, 96.41.38.202, 20.102.235.89-Azure-botnet, ...)
    # started probing classic secret paths (`/.env`, `/.git/config`,
    # `/.ssh/authorized_keys`, `/laravel/.env*`, `/@fs/.git/...`,
    # rotating User-Agents + Referers to look organic). Without these
    # deny blocks the SPA `try_files ... /index.html` fallback
    # returned HTTP 200 + 931 bytes (the SPA shell) for every probe,
    # which (a) didn't actually leak content but (b) marked the host
    # as "interesting" for follow-up attacks. The 404s here close
    # that signal channel.
    #
    # access_log off on the deny blocks suppresses log spam — once
    # the response is consistent 404, every scanner gets bored fast.

    # Dotfile probes: .env, .env.*, .env_*, .envrc, .git/*, .ssh/*,
    # .htaccess, .DS_Store, etc.
    location ~ /\. {
        access_log off;
        log_not_found off;
        return 404;
    }

    # Common reconnaissance patterns from automated scanners. Not
    # exhaustive — defense in depth. PHP/Laravel/WordPress paths
    # that have NO legitimate use in this app.
    location ~* /(wp-|phpmyadmin|@fs|laravel/\.env|server-status|server-info) {
        access_log off;
        log_not_found off;
        return 404;
    }

    # WebSocket endpoints (must be before generic /api/ block)
    location /api/v1/ws {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-KubeBolt-Edge "public";
        proxy_read_timeout 86400;
    }

    location /ws/exec/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-KubeBolt-Edge "public";
        proxy_read_timeout 86400;
    }

    # REST API proxy
    location /api/ {
        proxy_pass http://api:8080;
        # HTTP/1.1 + keep-alive to the upstream. nginx's proxy_pass defaults to
        # HTTP/1.0, which works fine for plain REST — until an L7 proxy sits in
        # the path (e.g. Cilium's Envoy under a CiliumNetworkPolicy with `http`
        # rules), which rejects HTTP/1.0 with "426 Upgrade Required" and breaks
        # every /api call. 1.1 is the modern default regardless (connection
        # reuse); clearing Connection lets nginx hold the upstream keep-alive.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Mark traffic as arriving via the public edge. Force-set (overrides
        # any client-supplied value) so a leaked service token (kbs_)
        # presented from the internet is rejected by the API. Internal
        # callers (e.g. Autopilot → api Service, in-cluster) bypass nginx and
        # never carry this header. Relies on the api being ClusterIP-only so
        # ALL external traffic passes through here.
        proxy_set_header X-KubeBolt-Edge "public";
    }

    # Port-forward reverse proxy. The backend proxies /pf/{id}/ to the
    # forwarded pod's loopback port, so an HTTP service is reachable from
    # the dashboard origin REGARDLESS of where the backend runs (no
    # same-machine requirement, unlike a direct host:port link). Upgrade
    # headers let the forwarded UI's own WebSockets/SSE work too.
    location /pf/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-KubeBolt-Edge "public";
        proxy_read_timeout 86400;
    }

    # SPA fallback. React Router paths are alphanumeric (no dots, no
    # special chars). Real static assets (e.g. /assets/foo.js) match
    # via $uri before falling back. Anything else gets the SPA shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
