<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-label="Kobi · investigating">
  <style>
    @keyframes kobi-investigating-ring {
      0%   { opacity: 0.9; transform: scale(0.5); }
      100% { opacity: 0;   transform: scale(2.4); }
    }
    @keyframes kobi-diagonals-emphasize {
      0%, 100% { opacity: 0.7; }
      50%      { opacity: 1; }
    }
    .kobi-ring-1 {
      animation: kobi-investigating-ring 1600ms cubic-bezier(0.16, 1, 0.3, 1) infinite;
      transform-origin: 23.5px 16px;
    }
    .kobi-ring-2 {
      animation: kobi-investigating-ring 1600ms cubic-bezier(0.16, 1, 0.3, 1) infinite;
      animation-delay: 800ms;
      transform-origin: 23.5px 16px;
    }
    .kobi-diagonal-investigating {
      animation: kobi-diagonals-emphasize 1600ms ease-in-out infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      .kobi-ring-1, .kobi-ring-2, .kobi-diagonal-investigating { animation: none; }
      .kobi-ring-1, .kobi-ring-2 { opacity: 0.5; }
    }
  </style>
  <line x1="9" y1="6" x2="9" y2="26" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="square"/>
  <line x1="11.5" y1="14" x2="20" y2="6" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="square" class="kobi-diagonal-investigating"/>
  <line x1="11.5" y1="18" x2="20" y2="26" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="square" class="kobi-diagonal-investigating"/>
  <circle cx="23.5" cy="16" r="1.76" fill="#fbbf24"/>
  <circle cx="23.5" cy="16" r="1.76" fill="none" stroke="#fbbf24" stroke-width="0.7" class="kobi-ring-1"/>
  <circle cx="23.5" cy="16" r="1.76" fill="none" stroke="#fbbf24" stroke-width="0.7" class="kobi-ring-2"/>
</svg>
