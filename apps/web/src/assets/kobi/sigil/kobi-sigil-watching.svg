<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-label="Kobi · watching">
  <style>
    @keyframes kobi-watching-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.82); }
    }
    .kobi-dot-watching {
      animation: kobi-watching-pulse 2400ms cubic-bezier(0.4, 0, 0.6, 1) infinite;
      transform-origin: 23.5px 16px;
    }
    @media (prefers-reduced-motion: reduce) {
      .kobi-dot-watching { animation: none; }
    }
  </style>
  <line x1="9" y1="6" x2="9" y2="26" stroke="#34d399" stroke-width="1.8" stroke-linecap="square"/>
  <line x1="11.5" y1="14" x2="20" y2="6" stroke="#34d399" stroke-width="1.8" stroke-linecap="square"/>
  <line x1="11.5" y1="18" x2="20" y2="26" stroke="#34d399" stroke-width="1.8" stroke-linecap="square"/>
  <circle cx="23.5" cy="16" r="1.76" fill="#34d399" class="kobi-dot-watching"/>
</svg>
