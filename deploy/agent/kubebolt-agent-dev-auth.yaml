# kubebolt-agent dev DaemonSet WITH backend auth (Sprint A onwards).
#
# Same shape as kubebolt-agent-dev.yaml + ingest-token bearer auth.
# The agent reads the token from a Secret mounted at
# /var/run/secrets/kubebolt/token and attaches it as a Bearer header
# on every gRPC RPC. Token rotation is transparent — the agent
# re-reads the file on every call.
#
# Auth mode: ingest-token (set via env). For tokenreview mode the
# manifest would project the SA token instead — that path lives in the
# helm chart at deploy/helm/kubebolt-agent/.
#
# TLS: not configured here. The dev backend runs plaintext on
# host.docker.internal:9090, so the bearer travels in plaintext too.
# The agent logs a WARN at startup ("auth without TLS"). Acceptable
# for dev/trusted networks; production should use the helm chart with
# tls.enabled=true.
#
# Apply with: make agent-deploy-auth
# (or manually after substituting __TOKEN_SECRET__ / __TOKEN_KEY__)
#
# Required Secret:
#   kubectl create secret generic <secret-name> \
#     -n kubebolt-system --from-literal=token=kb_xxxxxxxxx

apiVersion: v1
kind: Namespace
metadata:
  name: kubebolt-system

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubebolt-agent
  namespace: kubebolt-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubebolt-agent-reader
rules:
  - apiGroups: [""]
    resources: ["nodes/stats", "nodes/proxy", "nodes/metrics"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubebolt-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubebolt-agent-reader
subjects:
  - kind: ServiceAccount
    name: kubebolt-agent
    namespace: kubebolt-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubebolt-agent-leader
  namespace: kubebolt-system
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubebolt-agent-leader
  namespace: kubebolt-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubebolt-agent-leader
subjects:
  - kind: ServiceAccount
    name: kubebolt-agent
    namespace: kubebolt-system

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kubebolt-agent
  namespace: kubebolt-system
  labels:
    app: kubebolt-agent
spec:
  selector:
    matchLabels:
      app: kubebolt-agent
  template:
    metadata:
      labels:
        app: kubebolt-agent
      annotations:
        # Force a rolling restart every apply so a token rotation that
        # only changes the Secret content (Secret-name unchanged)
        # propagates to running pods. Without this annotation kubelet
        # eventually catches up on its own (~minute) but the inner-dev
        # loop wants the new token immediately.
        kubebolt.dev/applied-at: "auth"
    spec:
      serviceAccountName: kubebolt-agent
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: kubebolt-agent:dev
          imagePullPolicy: Never
          env:
            - name: KUBEBOLT_AGENT_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: KUBEBOLT_AGENT_NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KUBEBOLT_BACKEND_URL
              value: "host.docker.internal:9090"
            - name: KUBEBOLT_AGENT_CLUSTER_NAME
              value: "kind-kubebolt-dev"
            - name: KUBEBOLT_HUBBLE_ENABLED
              value: "true"
            # ─── Sprint A auth ──────────────────────────────────────
            - name: KUBEBOLT_AGENT_AUTH_MODE
              value: "ingest-token"
            - name: KUBEBOLT_AGENT_TOKEN_FILE
              value: /var/run/secrets/kubebolt/token
          volumeMounts:
            - name: kubebolt-token
              mountPath: /var/run/secrets/kubebolt
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 30Mi
            limits:
              cpu: 100m
              memory: 80Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: kubebolt-token
          secret:
            secretName: __TOKEN_SECRET__
            items:
              - key: __TOKEN_KEY__
                path: token
