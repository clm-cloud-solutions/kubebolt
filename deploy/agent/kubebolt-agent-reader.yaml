# ─────────────────────────────────────────────────────────────────────────────
# kubebolt-agent — Reader install (cluster-wide read, proxy on)
#
# Use this manifest when:
#   - The cluster's apiserver is NOT directly reachable from the
#     KubeBolt backend (private network / no public LB / on-prem
#     behind a NAT) — the agent's outbound gRPC channel is the only
#     path the backend has into this cluster.
#   - You want full read-only dashboard: inventory, YAML, describe,
#     logs, file browser, but NOT exec / scale / restart / delete /
#     YAML edit. Mutations through the proxy come back 403 because
#     this mode's RBAC has no write verbs.
#
# What this gives you in the dashboard:
#   - Everything from the metrics tier (kubelet stats + Hubble
#     flows), PLUS
#   - Live read of every resource in the cluster (Pods, Deployments,
#     Services, Secrets — yes, secrets are readable; tighten via
#     OPA/Gatekeeper if that's a concern), PLUS
#   - Pod logs, file browser (read-only), kubectl describe.
#
# What this does NOT give you:
#   - exec / port-forward / scale / restart / delete / YAML edit /
#     resource creation. Pick kubebolt-agent-operator.yaml for those.
#
# Apply:
#   kubectl apply -f kubebolt-agent-reader.yaml
#
# ─────────────────────────────────────────────────────────────────────────────
# CONFIGURABLE — edit these before kubectl apply
# ─────────────────────────────────────────────────────────────────────────────
#
# 1. KUBEBOLT_BACKEND_URL value — replace "PLACEHOLDER:9090" with
#    your KubeBolt backend's gRPC address. For SaaS-style installs
#    the backend lives outside this cluster, e.g.
#    "ingest.your-saas.example.com:9090".
#
# 2. (recommended) Auth — set up an ingest token Secret if your
#    backend runs in `enforced` or `permissive` mode:
#       1. Generate a token (KubeBolt admin UI → Agent Tokens, or
#          POST /api/v1/admin/tenants/{id}/tokens).
#       2. kubectl create secret generic kubebolt-agent-token \
#            -n kubebolt-system \
#            --from-literal=token=<paste-token>
#       3. Uncomment the auth env block + Secret volume below.
#
# 3. Image tag (default v0.2.0).
#
# 4. (optional) Hubble — leave KUBEBOLT_HUBBLE_ENABLED=true unless
#    you want to silence flow collection (e.g. on a non-Cilium cluster
#    you can set it to false to skip the periodic relay-not-found
#    warnings).
#
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: kubebolt-system
  labels:
    app.kubernetes.io/name: kubebolt-agent
    app.kubernetes.io/part-of: kubebolt
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubebolt-agent
  namespace: kubebolt-system
  labels:
    app.kubernetes.io/name: kubebolt-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: kubebolt
---
# ─── Metrics tier (always installed; the agent's own runtime needs) ───
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubebolt-agent-metrics
  labels:
    app.kubernetes.io/name: kubebolt-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: kubebolt
    kubebolt.dev/rbac-tier: metrics
rules:
  - apiGroups: [""]
    resources: ["nodes/stats", "nodes/proxy", "nodes/metrics"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubebolt-agent-metrics
  labels:
    app.kubernetes.io/name: kubebolt-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: kubebolt
    kubebolt.dev/rbac-tier: metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubebolt-agent-metrics
subjects:
  - kind: ServiceAccount
    name: kubebolt-agent
    namespace: kubebolt-system
---
# ─── Reader tier (cluster-wide get/list/watch on `*/*`) ───
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubebolt-agent-reader
  labels:
    app.kubernetes.io/name: kubebolt-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: kubebolt
    kubebolt.dev/rbac-tier: reader
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/proxy", "services/proxy", "nodes/proxy"]
    verbs: ["get"]
  # Discovery — client-go hits these on every connection.
  - nonResourceURLs: ["*"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubebolt-agent-reader
  labels:
    app.kubernetes.io/name: kubebolt-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: kubebolt
    kubebolt.dev/rbac-tier: reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubebolt-agent-reader
subjects:
  - kind: ServiceAccount
    name: kubebolt-agent
    namespace: kubebolt-system
---
# ─── Leader election (namespace-scoped Lease) ───
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubebolt-agent-leader
  namespace: kubebolt-system
  labels:
    app.kubernetes.io/name: kubebolt-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: kubebolt
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubebolt-agent-leader
  namespace: kubebolt-system
  labels:
    app.kubernetes.io/name: kubebolt-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: kubebolt
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubebolt-agent-leader
subjects:
  - kind: ServiceAccount
    name: kubebolt-agent
    namespace: kubebolt-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kubebolt-agent
  namespace: kubebolt-system
  labels:
    app.kubernetes.io/name: kubebolt-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: kubebolt
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kubebolt-agent
      app.kubernetes.io/instance: kubebolt-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubebolt-agent
        app.kubernetes.io/instance: kubebolt-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: kubebolt
    spec:
      serviceAccountName: kubebolt-agent
      tolerations:
        - operator: Exists
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      # volumes:
      #   # Uncomment this block + the corresponding volumeMount + auth
      #   # env vars below to enable ingest-token authentication. The
      #   # Secret must already exist; see the CONFIGURABLE block above.
      #   - name: kubebolt-agent-token
      #     secret:
      #       secretName: kubebolt-agent-token
      containers:
        - name: agent
          image: ghcr.io/clm-cloud-solutions/kubebolt/agent:v0.2.0
          imagePullPolicy: IfNotPresent
          env:
            # CHANGE ME — see CONFIGURABLE block at the top.
            - name: KUBEBOLT_BACKEND_URL
              value: "PLACEHOLDER:9090"
            - name: KUBEBOLT_AGENT_LOG_LEVEL
              value: "info"
            - name: KUBEBOLT_AGENT_NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: KUBEBOLT_AGENT_NODE_IP
              valueFrom: { fieldRef: { fieldPath: status.hostIP } }
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: KUBEBOLT_HUBBLE_ENABLED
              value: "true"
            # Proxy ON — required for the reader tier. The backend
            # routes apiserver calls through this agent's outbound
            # channel.
            - name: KUBEBOLT_AGENT_PROXY_ENABLED
              value: "true"
            # Auth (commented out by default; uncomment + create the
            # Secret to enable; see CONFIGURABLE block at the top).
            # - name: KUBEBOLT_AGENT_AUTH_MODE
            #   value: "ingest-token"
            # - name: KUBEBOLT_AGENT_TOKEN_FILE
            #   value: /var/run/secrets/kubebolt/token
          # volumeMounts:
          #   - name: kubebolt-agent-token
          #     mountPath: /var/run/secrets/kubebolt
          #     readOnly: true
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 30Mi
            limits:
              cpu: 100m
              memory: 80Mi
