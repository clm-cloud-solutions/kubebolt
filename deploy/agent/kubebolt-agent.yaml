apiVersion: v1
kind: Namespace
metadata: {name: kubebolt}
---
apiVersion: apps/v1
kind: DaemonSet
metadata: {name: kubebolt-agent, namespace: kubebolt}
spec:
  selector: {matchLabels: {app: kubebolt-agent}}
  template:
    metadata: {labels: {app: kubebolt-agent}}
    spec:
      containers:
        - name: agent
          image: kubebolt/agent:latest
          resources: {requests: {cpu: 10m, memory: 32Mi}, limits: {cpu: 50m, memory: 64Mi}}
