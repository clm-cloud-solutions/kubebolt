# kubebolt-agent dev DaemonSet.
#
# Targeted at docker-desktop Kubernetes: the agent reaches the KubeBolt
# backend (running via `make dev` on the host) through host.docker.internal.
# For kind / minikube / real clusters, replace KUBEBOLT_BACKEND_URL with
# whatever Service / hostname routes to the backend gRPC on :9090.
#
# Apply with: make agent-deploy
# (or manually: kubectl apply -f deploy/agent/kubebolt-agent-dev.yaml)

apiVersion: v1
kind: Namespace
metadata:
  name: kubebolt-system

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubebolt-agent
  namespace: kubebolt-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubebolt-agent-reader
rules:
  # Read-only access to kubelet stats via the apiserver proxy.
  - apiGroups: [""]
    resources: ["nodes/stats", "nodes/proxy", "nodes/metrics"]
    verbs: ["get"]
  # Pods are watched for metadata enrichment; falls back on this API if the
  # local kubelet /pods endpoint is unreachable.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch"]
  # The agent reads the kube-system namespace UID on startup to use as
  # its canonical cluster_id — that's the label that scopes every sample
  # to this specific cluster. One "get" on one namespace, nothing more.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubebolt-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubebolt-agent-reader
subjects:
  - kind: ServiceAccount
    name: kubebolt-agent
    namespace: kubebolt-system

---
# Namespace-scoped lease permissions for the flow-collector singleton
# election. Only one kubebolt-agent pod streams from Hubble Relay at a
# time; the rest sit on standby and take over if the leader dies.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubebolt-agent-leader
  namespace: kubebolt-system
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubebolt-agent-leader
  namespace: kubebolt-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubebolt-agent-leader
subjects:
  - kind: ServiceAccount
    name: kubebolt-agent
    namespace: kubebolt-system

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kubebolt-agent
  namespace: kubebolt-system
  labels:
    app: kubebolt-agent
spec:
  selector:
    matchLabels:
      app: kubebolt-agent
  template:
    metadata:
      labels:
        app: kubebolt-agent
    spec:
      serviceAccountName: kubebolt-agent
      # Run on every node including control-plane (for single-node dev clusters).
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: kubebolt-agent:dev
          # Use the image already loaded into the local Docker daemon; never
          # try to pull from a registry. Rebuilt by `make agent-image`.
          imagePullPolicy: Never
          env:
            - name: KUBEBOLT_AGENT_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Node IP tells the agent where to reach the local kubelet
            # (https://$NODE_IP:10250/stats/summary + /pods).
            - name: KUBEBOLT_AGENT_NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            # POD_NAME + POD_NAMESPACE are used by the Hubble flow
            # collector's leader-election identity and to locate the
            # Lease in the agent's own namespace.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KUBEBOLT_BACKEND_URL
              value: "host.docker.internal:9090"
            # Human-readable cluster name emitted alongside the
            # auto-discovered cluster_id UID. Purely a display label —
            # the canonical identifier is still the kube-system UID,
            # which the agent reads from the K8s API at startup. Change
            # this to something meaningful when deploying to a new
            # cluster (e.g. "prod-eks-us-east-1").
            - name: KUBEBOLT_AGENT_CLUSTER_NAME
              value: "kind-kubebolt-dev"
            # Hubble flow collector kill-switch. Default is on; set to
            # "false" to disable flow collection entirely without
            # redeploying (e.g. while debugging, or when running on a
            # Cilium cluster where you don't want the extra telemetry).
            # Accepts 1/0, true/false, yes/no (case-insensitive).
            - name: KUBEBOLT_HUBBLE_ENABLED
              value: "true"
            # mTLS to Hubble Relay (for production Cilium installs that
            # require it). The dev cluster's relay speaks plaintext, so
            # these env vars stay commented out and the client falls
            # back to insecure transport.
            #
            # - name: KUBEBOLT_HUBBLE_RELAY_CA_FILE
            #   value: /etc/hubble-tls/ca.crt
            # - name: KUBEBOLT_HUBBLE_RELAY_CERT_FILE
            #   value: /etc/hubble-tls/tls.crt
            # - name: KUBEBOLT_HUBBLE_RELAY_KEY_FILE
            #   value: /etc/hubble-tls/tls.key
            # - name: KUBEBOLT_HUBBLE_RELAY_SERVER_NAME
            #   value: "*.hubble-relay.cilium.io"
          # Uncomment the volume + volumeMount below to supply cert
          # material when mTLS is enabled. Expects a Secret named
          # "hubble-client-tls" with keys ca.crt / tls.crt / tls.key.
          # volumeMounts:
          #   - name: hubble-tls
          #     mountPath: /etc/hubble-tls
          #     readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 30Mi
            limits:
              cpu: 100m
              memory: 80Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      # volumes:
      #   - name: hubble-tls
      #     secret:
      #       secretName: hubble-client-tls
