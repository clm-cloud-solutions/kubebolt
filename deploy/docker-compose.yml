services:
  api:
    # Build context is the repo root (one level up from deploy/) so the
    # Dockerfile can pick up both apps/api and packages/proto — the
    # api module uses a replace directive into ../../packages/proto.
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - "8080:8080"   # HTTP/REST + WebSocket
      - "9090:9090"   # gRPC AgentIngest (Phase 2)
    volumes:
      - /tmp/docker-kubeconfig:/root/.kube/config:ro
      # AWS credentials are needed for EKS token generation (aws eks get-token).
      # Remove this line if you're not using EKS clusters.
      - ~/.aws:/root/.aws:ro
      - kubebolt-data:/data
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      - victoriametrics
    environment:
      # Authentication — enabled by default. Set to false for open access (no login).
      - KUBEBOLT_AUTH_ENABLED=${KUBEBOLT_AUTH_ENABLED:-true}
      - KUBEBOLT_ADMIN_PASSWORD=${KUBEBOLT_ADMIN_PASSWORD:-}
      - KUBEBOLT_JWT_SECRET=${KUBEBOLT_JWT_SECRET:-}
      - KUBEBOLT_DATA_DIR=/data
      # Metrics storage (Phase 2). Backend writes via Prom remote_write and
      # queries via PromQL. VictoriaMetrics is the default; swap by pointing
      # this URL at any Prom-compatible TSDB.
      - KUBEBOLT_METRICS_STORAGE_URL=${KUBEBOLT_METRICS_STORAGE_URL:-http://victoriametrics:8428}
      # Prom remote_write receiver (Phase 2). Gates POST /api/v1/prom/write —
      # the path vmagent (kubebolt-agent v1.0+ sidecar) uses to ship scraped
      # samples into VM. Default off.
      - KUBEBOLT_REMOTE_WRITE_ENABLED=${KUBEBOLT_REMOTE_WRITE_ENABLED:-false}
      # Three-tier auth (disabled | permissive | enforced) — mirrors the
      # gRPC channel's KUBEBOLT_AGENT_AUTH_MODE. Default disabled for
      # backwards compat with Sprint A migration.
      - KUBEBOLT_REMOTE_WRITE_AUTH_MODE=${KUBEBOLT_REMOTE_WRITE_AUTH_MODE:-disabled}
      # Per-tenant Prom remote_write limits (Phase 3). Fleet-wide
      # defaults applied when a tenant has no admin-API override.
      # See deploy/.env.example for the full description.
      - KUBEBOLT_PROM_WRITE_DEFAULT_SAMPLES_PER_SEC=${KUBEBOLT_PROM_WRITE_DEFAULT_SAMPLES_PER_SEC:-10000}
      - KUBEBOLT_PROM_WRITE_DEFAULT_BURST_SAMPLES=${KUBEBOLT_PROM_WRITE_DEFAULT_BURST_SAMPLES:-100000}
      - KUBEBOLT_PROM_WRITE_DEFAULT_MAX_ACTIVE_SERIES=${KUBEBOLT_PROM_WRITE_DEFAULT_MAX_ACTIVE_SERIES:-1000000}
      # AI Copilot — set KUBEBOLT_AI_API_KEY in your shell or .env file to enable.
      # The copilot is disabled if no key is set; KubeBolt works fully without it.
      - KUBEBOLT_AI_PROVIDER=${KUBEBOLT_AI_PROVIDER:-anthropic}
      - KUBEBOLT_AI_API_KEY=${KUBEBOLT_AI_API_KEY:-}
      - KUBEBOLT_AI_MODEL=${KUBEBOLT_AI_MODEL:-}
      - KUBEBOLT_AI_BASE_URL=${KUBEBOLT_AI_BASE_URL:-}
      - KUBEBOLT_AI_MAX_TOKENS=${KUBEBOLT_AI_MAX_TOKENS:-4096}
      - KUBEBOLT_AI_FALLBACK_PROVIDER=${KUBEBOLT_AI_FALLBACK_PROVIDER:-}
      - KUBEBOLT_AI_FALLBACK_API_KEY=${KUBEBOLT_AI_FALLBACK_API_KEY:-}
      - KUBEBOLT_AI_FALLBACK_MODEL=${KUBEBOLT_AI_FALLBACK_MODEL:-}
      - KUBEBOLT_AI_FALLBACK_BASE_URL=${KUBEBOLT_AI_FALLBACK_BASE_URL:-}
      - KUBEBOLT_AI_SHOW_TOOL_CALLS=${KUBEBOLT_AI_SHOW_TOOL_CALLS:-true}
      # How long the UI polls an executed action for convergence before marking
      # it stalled and auto-triggering a Kobi root-cause turn. Default 90s.
      - KUBEBOLT_AI_ACTION_PROGRESS_TIMEOUT=${KUBEBOLT_AI_ACTION_PROGRESS_TIMEOUT:-90s}
      # Max tool-call rounds per Kobi turn; on exhaustion Kobi summarizes instead
      # of erroring. Raise for small sequential models (Haiku). Clamped [2,40].
      - KUBEBOLT_AI_MAX_ROUNDS=${KUBEBOLT_AI_MAX_ROUNDS:-20}
      # Kobi conversation history — persisted per user (refresh / re-login resume).
      - KUBEBOLT_COPILOT_CONVERSATION_RETENTION_HORIZON=${KUBEBOLT_COPILOT_CONVERSATION_RETENTION_HORIZON:-2160h}
      - KUBEBOLT_COPILOT_CONVERSATION_MAX_PER_USER=${KUBEBOLT_COPILOT_CONVERSATION_MAX_PER_USER:-200}
      # Update check — set to false for air-gapped installs so the
      # backend never reaches out to api.github.com. Cache TTL 6h.
      - KUBEBOLT_UPDATE_CHECK_ENABLED=${KUBEBOLT_UPDATE_CHECK_ENABLED:-true}
      # Cold cluster-connect cache-sync timeout (seconds). Raise for large
      # clusters that flake on first switch. Runtime-overridable via
      # Settings → General (no restart). Default 45.
      - KUBEBOLT_CACHE_SYNC_TIMEOUT_SECONDS=${KUBEBOLT_CACHE_SYNC_TIMEOUT_SECONDS:-45}
      # AgentChannel gRPC max message size (bytes). Large clusters proxy
      # apiserver responses over the channel that exceed gRPC's 4 MiB
      # default. Must match the agent's KUBEBOLT_AGENT_MAX_MSG_BYTES.
      # Default 67108864 (64 MiB).
      - KUBEBOLT_AGENT_MAX_MSG_BYTES=${KUBEBOLT_AGENT_MAX_MSG_BYTES:-67108864}
  web:
    build: ../apps/web
    ports: ["3000:3000"]
    depends_on: [api]
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.145.0-scratch
    ports: ["8428:8428"]
    volumes:
      - kubebolt-vm-data:/victoria-metrics-data
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--retentionPeriod=${KUBEBOLT_METRICS_RETENTION:-30d}"
      - "--httpListenAddr=:8428"
      # Collapse identical samples written within this window. Multi-
      # vmagent installs (kubebolt-agent DaemonSet, one pod per node)
      # produce N×duplicate kube-state-metrics samples when KSM is
      # scraped via the dedicated job — VM keeps only the latest within
      # the dedup bucket. Match the agent's scrape_interval (30s) so
      # duplicates land in the same bucket. Day 4 (361887d) documented
      # this strategy but never wired the flag; closed here.
      # Idempotent for single-vmagent setups — no duplicates to collapse.
      - "--dedup.minScrapeInterval=30s"
    restart: unless-stopped

volumes:
  kubebolt-data:
  kubebolt-vm-data:
