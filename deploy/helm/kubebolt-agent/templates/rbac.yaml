{{- if .Values.rbac.create -}}
# ─── Cluster-wide reads ───────────────────────────────────
# The agent pulls kubelet /stats/summary via the apiserver proxy, watches
# Pods for metadata enrichment, and reads the kube-system namespace UID
# at startup to use as its canonical cluster_id label.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubebolt-agent.fullname" . }}-reader
  labels:
    {{- include "kubebolt-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes/stats", "nodes/proxy", "nodes/metrics"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubebolt-agent.fullname" . }}
  labels:
    {{- include "kubebolt-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubebolt-agent.fullname" . }}-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "kubebolt-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# ─── Lease-based leader election (namespace-scoped) ───────
# Only one agent pod streams from Hubble Relay at a time; the rest sit
# on standby. The Lease lives in the release namespace so this Role is
# the minimum the election loop needs.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubebolt-agent.fullname" . }}-leader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubebolt-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubebolt-agent.fullname" . }}-leader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubebolt-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubebolt-agent.fullname" . }}-leader
subjects:
  - kind: ServiceAccount
    name: {{ include "kubebolt-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
