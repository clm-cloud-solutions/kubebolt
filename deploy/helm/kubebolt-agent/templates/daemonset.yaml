{{- $backendUrl := required "backendUrl is required — set --set backendUrl=<host:port> or configure it in values.yaml" .Values.backendUrl -}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "kubebolt-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubebolt-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "kubebolt-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubebolt-agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.podAnnotationChecksum }}
        # Forces a rolling restart of the DaemonSet when values affecting
        # the Pod spec change (env, TLS secret ref, etc.) even if the
        # rendered template looks structurally identical to Helm.
        checksum/values: {{ toYaml .Values | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "kubebolt-agent.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          image: {{ include "kubebolt-agent.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: KUBEBOLT_BACKEND_URL
              value: {{ $backendUrl | quote }}
            - name: KUBEBOLT_AGENT_LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            # Downward API — the kubelet target + leader-election identity
            # are per-pod values, so they must come from fieldRefs.
            - name: KUBEBOLT_AGENT_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: KUBEBOLT_AGENT_NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.cluster.name }}
            - name: KUBEBOLT_AGENT_CLUSTER_NAME
              value: {{ .Values.cluster.name | quote }}
            {{- end }}
            {{- if .Values.cluster.id }}
            - name: KUBEBOLT_AGENT_CLUSTER_ID
              value: {{ .Values.cluster.id | quote }}
            {{- end }}
            - name: KUBEBOLT_HUBBLE_ENABLED
              value: {{ .Values.hubble.enabled | quote }}
            {{- /* ── K8s API proxy (Sprint A.5) ── */ -}}
            {{- /* Auto-derive proxy enable from rbac.mode unless an
                   explicit override was given. proxy is the path the
                   backend uses to reach the apiserver via the agent —
                   reader/operator REQUIRE it; metrics doesn't use it. */ -}}
            {{- $mode := default "reader" .Values.rbac.mode -}}
            {{- $proxyAuto := or (eq $mode "reader") (eq $mode "operator") -}}
            {{- $proxyEnabled := $proxyAuto -}}
            {{- if hasKey .Values.proxy "enabled" -}}
              {{- $proxyEnabled = .Values.proxy.enabled -}}
              {{- if and (not $proxyEnabled) (or (eq $mode "reader") (eq $mode "operator")) -}}
                {{- fail (printf "rbac.mode=%s requires proxy.enabled=true (proxy is the only path to apiserver via the agent)" $mode) -}}
              {{- end -}}
            {{- end }}
            - name: KUBEBOLT_AGENT_PROXY_ENABLED
              value: {{ $proxyEnabled | quote }}
            {{- if .Values.hubble.relay.address }}
            - name: KUBEBOLT_HUBBLE_RELAY_ADDR
              value: {{ .Values.hubble.relay.address | quote }}
            {{- end }}
            {{- if .Values.hubble.relay.tls.existingSecret }}
            # Assumes keys ca.crt / tls.crt / tls.key in the Secret.
            # ca.crt alone enables TLS; adding tls.crt+tls.key enables mTLS.
            - name: KUBEBOLT_HUBBLE_RELAY_CA_FILE
              value: /etc/hubble-tls/ca.crt
            - name: KUBEBOLT_HUBBLE_RELAY_CERT_FILE
              value: /etc/hubble-tls/tls.crt
            - name: KUBEBOLT_HUBBLE_RELAY_KEY_FILE
              value: /etc/hubble-tls/tls.key
            {{- end }}
            {{- if .Values.hubble.relay.tls.serverName }}
            - name: KUBEBOLT_HUBBLE_RELAY_SERVER_NAME
              value: {{ .Values.hubble.relay.tls.serverName | quote }}
            {{- end }}
            {{- /* ── Backend auth (Sprint A) ── */ -}}
            {{- if eq .Values.auth.mode "tokenreview" }}
            - name: KUBEBOLT_AGENT_AUTH_MODE
              value: "tokenreview"
            - name: KUBEBOLT_AGENT_TOKEN_FILE
              value: /var/run/secrets/kubebolt/token
            {{- else if eq .Values.auth.mode "ingest-token" }}
            {{- if not .Values.auth.ingestToken.existingSecret }}
            {{- fail "auth.mode=ingest-token requires auth.ingestToken.existingSecret" }}
            {{- end }}
            - name: KUBEBOLT_AGENT_AUTH_MODE
              value: "ingest-token"
            - name: KUBEBOLT_AGENT_TOKEN_FILE
              value: /var/run/secrets/kubebolt/token
            {{- end }}
            {{- /* ── Transport TLS ── */ -}}
            {{- if .Values.tls.enabled }}
            - name: KUBEBOLT_AGENT_TLS_ENABLED
              value: "true"
            {{- if .Values.tls.serverName }}
            - name: KUBEBOLT_AGENT_TLS_SERVER_NAME
              value: {{ .Values.tls.serverName | quote }}
            {{- end }}
            {{- if .Values.tls.caSecret }}
            - name: KUBEBOLT_AGENT_TLS_CA_FILE
              value: /etc/kubebolt-tls/ca.crt
            {{- end }}
            {{- if .Values.tls.clientCertSecret }}
            - name: KUBEBOLT_AGENT_TLS_CERT_FILE
              value: /etc/kubebolt-tls/tls.crt
            - name: KUBEBOLT_AGENT_TLS_KEY_FILE
              value: /etc/kubebolt-tls/tls.key
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- if .Values.hubble.relay.tls.existingSecret }}
            - name: hubble-tls
              mountPath: /etc/hubble-tls
              readOnly: true
            {{- end }}
            {{- if or (eq .Values.auth.mode "tokenreview") (eq .Values.auth.mode "ingest-token") }}
            - name: kubebolt-token
              mountPath: /var/run/secrets/kubebolt
              readOnly: true
            {{- end }}
            {{- if and .Values.tls.enabled (or .Values.tls.caSecret .Values.tls.clientCertSecret) }}
            - name: kubebolt-tls
              mountPath: /etc/kubebolt-tls
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.hubble.relay.tls.existingSecret }}
        - name: hubble-tls
          secret:
            secretName: {{ .Values.hubble.relay.tls.existingSecret }}
        {{- end }}
        {{- if eq .Values.auth.mode "tokenreview" }}
        # Projected SA token. Kubelet mints the token with the audience
        # the backend expects and rotates well before expiry.
        - name: kubebolt-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: {{ .Values.auth.tokenReview.audience | quote }}
                  expirationSeconds: {{ .Values.auth.tokenReview.expirationSeconds }}
                  path: token
        {{- else if eq .Values.auth.mode "ingest-token" }}
        # Long-lived bearer token from a Secret the operator owns. The
        # chart never sees the plaintext.
        - name: kubebolt-token
          secret:
            secretName: {{ .Values.auth.ingestToken.existingSecret | quote }}
            items:
              - key: {{ .Values.auth.ingestToken.key | quote }}
                path: token
        {{- end }}
        {{- if and .Values.tls.enabled (or .Values.tls.caSecret .Values.tls.clientCertSecret) }}
        # CA + optional client cert. Same Secret can carry both, or
        # split across two Secrets via projected sources if needed.
        - name: kubebolt-tls
          projected:
            sources:
              {{- if .Values.tls.caSecret }}
              - secret:
                  name: {{ .Values.tls.caSecret | quote }}
                  items:
                    - key: {{ .Values.tls.caKey | quote }}
                      path: ca.crt
              {{- end }}
              {{- if .Values.tls.clientCertSecret }}
              - secret:
                  name: {{ .Values.tls.clientCertSecret | quote }}
                  items:
                    - key: {{ .Values.tls.clientCertKey | quote }}
                      path: tls.crt
                    - key: {{ .Values.tls.clientKeyKey | quote }}
                      path: tls.key
              {{- end }}
        {{- end }}
