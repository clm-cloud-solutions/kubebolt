{{- $backendUrl := required "backendUrl is required — set --set backendUrl=<host:port> or configure it in values.yaml" .Values.backendUrl -}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "kubebolt-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubebolt-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "kubebolt-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubebolt-agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.podAnnotationChecksum }}
        # Forces a rolling restart of the DaemonSet when values affecting
        # the Pod spec change (env, TLS secret ref, etc.) even if the
        # rendered template looks structurally identical to Helm.
        checksum/values: {{ toYaml .Values | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "kubebolt-agent.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /* PriorityClass selection (precedence top-down):
             1. Legacy `priorityClassName` (string) — wins if set.
             2. priority.enabled=true + non-empty priority.className → use it.
             3. priority.enabled=true + empty priority.className → chart-managed
                `<release>-priority`, rendered by templates/priorityclass.yaml.
             4. Otherwise no priorityClassName (default scheduling). */ -}}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- else if .Values.priority.enabled }}
      priorityClassName: {{ default (printf "%s-priority" (include "kubebolt-agent.fullname" .)) .Values.priority.className }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          image: {{ include "kubebolt-agent.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: KUBEBOLT_BACKEND_URL
              value: {{ $backendUrl | quote }}
            - name: KUBEBOLT_AGENT_LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            # Downward API — the kubelet target + leader-election identity
            # are per-pod values, so they must come from fieldRefs.
            - name: KUBEBOLT_AGENT_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: KUBEBOLT_AGENT_NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.cluster.name }}
            - name: KUBEBOLT_AGENT_CLUSTER_NAME
              value: {{ .Values.cluster.name | quote }}
            {{- end }}
            {{- if .Values.cluster.id }}
            - name: KUBEBOLT_AGENT_CLUSTER_ID
              value: {{ .Values.cluster.id | quote }}
            {{- end }}
            {{- /* Phase 3 Day 4.2 — tenant identity stamped on every
                   sample by the collectors. The receiver validates the
                   asserted label against the bearer token's tenant
                   (anti-spoof) and consumes it for per-tenant
                   cardinality + rate limit. Empty value omits the env
                   var entirely so the agent can't accidentally emit a
                   `tenant_id=""` label; receiver auto-stamps from the
                   bearer in that case. Nil-guarded with `and` so
                   helm upgrade --reuse-values from a pre-Phase-3
                   release (no `tenant` key in user values) keeps
                   rendering — without this guard the template panics
                   on `nil pointer evaluating interface {}.id`. */}}
            {{- if and .Values.tenant .Values.tenant.id }}
            - name: KUBEBOLT_TENANT_ID
              value: {{ .Values.tenant.id | quote }}
            {{- end }}
            - name: KUBEBOLT_HUBBLE_ENABLED
              value: {{ .Values.hubble.enabled | quote }}
            {{- /* When the vmagent sidecar is configured to scrape
                   node-exporter, the agent steps aside on
                   node_network_*_bytes_total emission — node-exporter
                   gives the same metric name with identical labels
                   from the same /proc/net/dev counters, so two
                   sources would double-count cluster-wide network
                   queries. Other node_* metrics (CPU, memory, FS)
                   keep emitting because their names diverge from
                   node-exporter's set. Operators can override by
                   setting the env var explicitly via .Values.extraEnv
                   if they want both sources for some reason. */ -}}
            {{- if and .Values.scrape.enabled .Values.scrape.discovery.nodeExporter.enabled }}
            - name: KUBEBOLT_AGENT_DEFER_NODE_NETWORK
              value: "true"
            {{- end }}
            {{- /* ── K8s API proxy (Sprint A.5) ── */ -}}
            {{- /* Auto-derive proxy enable from rbac.mode unless an
                   explicit override was given. proxy is the path the
                   backend uses to reach the apiserver via the agent —
                   reader/operator REQUIRE it; metrics doesn't use it. */ -}}
            {{- $mode := default "reader" .Values.rbac.mode -}}
            {{- $proxyAuto := or (eq $mode "reader") (eq $mode "operator") -}}
            {{- $proxyEnabled := $proxyAuto -}}
            {{- if hasKey .Values.proxy "enabled" -}}
              {{- $proxyEnabled = .Values.proxy.enabled -}}
              {{- if and (not $proxyEnabled) (or (eq $mode "reader") (eq $mode "operator")) -}}
                {{- fail (printf "rbac.mode=%s requires proxy.enabled=true (proxy is the only path to apiserver via the agent)" $mode) -}}
              {{- end -}}
            {{- end }}
            - name: KUBEBOLT_AGENT_PROXY_ENABLED
              value: {{ $proxyEnabled | quote }}
            {{- if .Values.hubble.relay.address }}
            - name: KUBEBOLT_HUBBLE_RELAY_ADDR
              value: {{ .Values.hubble.relay.address | quote }}
            {{- end }}
            {{- if .Values.hubble.relay.tls.existingSecret }}
            # Assumes keys ca.crt / tls.crt / tls.key in the Secret.
            # ca.crt alone enables TLS; adding tls.crt+tls.key enables mTLS.
            - name: KUBEBOLT_HUBBLE_RELAY_CA_FILE
              value: /etc/hubble-tls/ca.crt
            - name: KUBEBOLT_HUBBLE_RELAY_CERT_FILE
              value: /etc/hubble-tls/tls.crt
            - name: KUBEBOLT_HUBBLE_RELAY_KEY_FILE
              value: /etc/hubble-tls/tls.key
            {{- end }}
            {{- if .Values.hubble.relay.tls.serverName }}
            - name: KUBEBOLT_HUBBLE_RELAY_SERVER_NAME
              value: {{ .Values.hubble.relay.tls.serverName | quote }}
            {{- end }}
            {{- /* ── Backend auth (Sprint A) ── */ -}}
            {{- if eq .Values.auth.mode "tokenreview" }}
            - name: KUBEBOLT_AGENT_AUTH_MODE
              value: "tokenreview"
            - name: KUBEBOLT_AGENT_TOKEN_FILE
              value: /var/run/secrets/kubebolt/token
            {{- else if eq .Values.auth.mode "ingest-token" }}
            {{- if not .Values.auth.ingestToken.existingSecret }}
            {{- fail "auth.mode=ingest-token requires auth.ingestToken.existingSecret" }}
            {{- end }}
            - name: KUBEBOLT_AGENT_AUTH_MODE
              value: "ingest-token"
            - name: KUBEBOLT_AGENT_TOKEN_FILE
              value: /var/run/secrets/kubebolt/token
            {{- end }}
            {{- /* ── Transport TLS ── */ -}}
            {{- if .Values.tls.enabled }}
            - name: KUBEBOLT_AGENT_TLS_ENABLED
              value: "true"
            {{- if .Values.tls.serverName }}
            - name: KUBEBOLT_AGENT_TLS_SERVER_NAME
              value: {{ .Values.tls.serverName | quote }}
            {{- end }}
            {{- if .Values.tls.caSecret }}
            - name: KUBEBOLT_AGENT_TLS_CA_FILE
              value: /etc/kubebolt-tls/ca.crt
            {{- end }}
            {{- if .Values.tls.clientCertSecret }}
            - name: KUBEBOLT_AGENT_TLS_CERT_FILE
              value: /etc/kubebolt-tls/tls.crt
            - name: KUBEBOLT_AGENT_TLS_KEY_FILE
              value: /etc/kubebolt-tls/tls.key
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- if .Values.hubble.relay.tls.existingSecret }}
            - name: hubble-tls
              mountPath: /etc/hubble-tls
              readOnly: true
            {{- end }}
            {{- if or (eq .Values.auth.mode "tokenreview") (eq .Values.auth.mode "ingest-token") }}
            - name: kubebolt-token
              mountPath: /var/run/secrets/kubebolt
              readOnly: true
            {{- end }}
            {{- if and .Values.tls.enabled (or .Values.tls.caSecret .Values.tls.clientCertSecret) }}
            - name: kubebolt-tls
              mountPath: /etc/kubebolt-tls
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.scrape.enabled }}
        # ─── vmagent sidecar (Phase 2) ────────────────────────────
        # Scrapes Prom-compatible /metrics endpoints and ships
        # samples to the backend's /api/v1/prom/write receiver.
        # Per ADR-005 vmagent does NOT multiplex through the agent's
        # gRPC channel — it talks remote_write directly. That keeps
        # the agent's responsibility focused (collect + tunnel) and
        # lets vmagent crash without taking the agent with it.
        - name: vmagent
          image: "{{ .Values.scrape.image.repository }}:{{ .Values.scrape.image.tag }}"
          imagePullPolicy: {{ .Values.scrape.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          args:
            - "-promscrape.config=/etc/vmagent/scrape.yml"
            {{- if .Values.scrape.remoteWriteUrl }}
            - "-remoteWrite.url={{ .Values.scrape.remoteWriteUrl }}"
            {{- end }}
            {{- /* When the agent is configured with ingest-token auth,
                   reuse the SAME Secret for vmagent's remote_write —
                   no second token to provision. The backend validates
                   the bearer against the same TenantsStore that the
                   gRPC channel hits via BearerIngestAuth.
                   tokenreview mode doesn't carry through (it's a
                   projected SA token good for the apiserver, not for
                   /api/v1/prom/write — Phase 3 will add token-review
                   handling on the receiver side too). */ -}}
            {{- if eq .Values.auth.mode "ingest-token" }}
            - "-remoteWrite.bearerTokenFile=/var/run/secrets/kubebolt/token"
            {{- end }}
            # vmagent's persistent queue lives on disk; without an
            # emptyDir mount it'd try to write to the read-only
            # rootfs. The path matches `tmpDataPath` below.
            - "-remoteWrite.tmpDataPath=/var/lib/vmagent"
            # Refuse memory growth that would push the pod past its
            # limit (and into OOM kill). 60% of the limit leaves
            # headroom for scrape buffers.
            - "-memory.allowedPercent=60"
            # Enable %{ENV} expansion in the scrape config so each
            # vmagent can filter SD to its own node via the
            # NODE_NAME env var. Without this the relabel regex
            # %{NODE_NAME} would be a literal string and match
            # nothing, leaving every vmagent scraping zero pods.
            # vmagent's syntax is %{ENV_NAME} — no closing percent
            # (got that wrong in the first revision; the trailing %
            # passed through as a literal in the regex).
            - "-envflag.enable=true"
            # Cardinality caps — defensive limits that protect VM
            # from a single misconfigured target. Operators can
            # raise individually via .Values.scrape.limits.*
            # printf %d coerces YAML's float64 default for large
            # numbers (e.g. 16777216 → 1.6777216e+07) back into a
            # plain integer string that vmagent can parse.
            {{- if .Values.scrape.limits.maxScrapeSize }}
            - "-promscrape.maxScrapeSize={{ printf "%d" (int64 .Values.scrape.limits.maxScrapeSize) }}"
            {{- end }}
            {{- if .Values.scrape.limits.maxSeriesPerTarget }}
            - "-promscrape.seriesLimitPerTarget={{ printf "%d" (int64 .Values.scrape.limits.maxSeriesPerTarget) }}"
            {{- end }}
            {{- if .Values.scrape.limits.maxSeriesGlobal }}
            - "-remoteWrite.maxHourlySeries={{ printf "%d" (int64 .Values.scrape.limits.maxSeriesGlobal) }}"
            {{- end }}
            {{- range $k, $v := .Values.scrape.extraArgs }}
            - "-{{ $k }}={{ $v }}"
            {{- end }}
          env:
            # Surfaced so future scrape configs can use $(NODE_NAME)
            # in their service-discovery filter (per ADR-003).
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: vmagent-config
              mountPath: /etc/vmagent
              readOnly: true
            - name: vmagent-tmp
              mountPath: /var/lib/vmagent
            {{- if eq .Values.auth.mode "ingest-token" }}
            # Same `kubebolt-token` volume the agent container uses
            # — the bearer token serves both the gRPC channel
            # (BearerIngestAuth) and vmagent's remote_write
            # (TenantsStore-backed HTTP middleware on
            # /api/v1/prom/write). Single Secret, two consumers.
            - name: kubebolt-token
              mountPath: /var/run/secrets/kubebolt
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.scrape.resources | nindent 12 }}
        {{- end }}
      volumes:
        {{- if .Values.scrape.enabled }}
        # vmagent scrape config rendered by configmap-vmagent.yaml.
        - name: vmagent-config
          configMap:
            name: {{ include "kubebolt-agent.fullname" . }}-vmagent
        # Persistent queue + WAL for remote_write retries. emptyDir
        # is fine — if the pod dies, vmagent loses at most one
        # scrape window of buffered samples (negligible vs the cost
        # of a per-pod PVC across N nodes).
        - name: vmagent-tmp
          emptyDir:
            sizeLimit: 256Mi
        {{- end }}
        {{- if .Values.hubble.relay.tls.existingSecret }}
        - name: hubble-tls
          secret:
            secretName: {{ .Values.hubble.relay.tls.existingSecret }}
        {{- end }}
        {{- if eq .Values.auth.mode "tokenreview" }}
        # Projected SA token. Kubelet mints the token with the audience
        # the backend expects and rotates well before expiry.
        - name: kubebolt-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: {{ .Values.auth.tokenReview.audience | quote }}
                  expirationSeconds: {{ .Values.auth.tokenReview.expirationSeconds }}
                  path: token
        {{- else if eq .Values.auth.mode "ingest-token" }}
        # Long-lived bearer token from a Secret the operator owns. The
        # chart never sees the plaintext.
        - name: kubebolt-token
          secret:
            secretName: {{ .Values.auth.ingestToken.existingSecret | quote }}
            items:
              - key: {{ .Values.auth.ingestToken.key | quote }}
                path: token
        {{- end }}
        {{- if and .Values.tls.enabled (or .Values.tls.caSecret .Values.tls.clientCertSecret) }}
        # CA + optional client cert. Same Secret can carry both, or
        # split across two Secrets via projected sources if needed.
        - name: kubebolt-tls
          projected:
            sources:
              {{- if .Values.tls.caSecret }}
              - secret:
                  name: {{ .Values.tls.caSecret | quote }}
                  items:
                    - key: {{ .Values.tls.caKey | quote }}
                      path: ca.crt
              {{- end }}
              {{- if .Values.tls.clientCertSecret }}
              - secret:
                  name: {{ .Values.tls.clientCertSecret | quote }}
                  items:
                    - key: {{ .Values.tls.clientCertKey | quote }}
                      path: tls.crt
                    - key: {{ .Values.tls.clientKeyKey | quote }}
                      path: tls.key
              {{- end }}
        {{- end }}
