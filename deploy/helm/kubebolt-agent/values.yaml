# kubebolt-agent Helm values.
#
# Minimum install:
#   helm install kubebolt-agent oci://ghcr.io/clm-cloud-solutions/kubebolt/helm/kubebolt-agent \
#     --namespace kubebolt-system --create-namespace \
#     --set backendUrl=host.docker.internal:9090

# ─── Required ──────────────────────────────────────────────
# Where the agent ships samples. No sane default exists — it depends
# on where your KubeBolt backend runs (Docker Compose on your laptop,
# another cluster, same cluster). Template will fail fast without it.
# Examples:
#   host.docker.internal:9090                            (backend on laptop via Docker Desktop)
#   kubebolt.kubebolt.svc.cluster.local:9090             (in-cluster backend, default release)
#   10.0.0.5:9090                                        (bare IP)
backendUrl: ""

# ─── Image ─────────────────────────────────────────────────
image:
  repository: ghcr.io/clm-cloud-solutions/kubebolt/agent
  # Leave empty to track Chart.appVersion. Pin explicitly in prod.
  tag: ""
  pullPolicy: IfNotPresent
# imagePullSecrets:
#   - name: my-registry-secret

# ─── Tenant identity (Phase 3 Day 4.2) ────────────────────
# Per-tenant identifier stamped on every sample so the backend can:
#   - validate anti-spoof (asserted label == bearer token's tenant)
#   - enforce per-tenant cardinality + rate limits
#   - bill / scope queries in the SaaS edition
#
# Provisioning: when KubeBolt's admin generates an ingest token for
# a tenant, the response includes the tenant's UUID. Paste it here
# (and your token into auth.ingestToken below) at install time.
#
# Empty is intentionally allowed — the agent ships samples without a
# tenant_id label and the backend's receiver auto-stamps from the
# bearer token. This is the transitional path; a future release will
# require this value in enforced auth mode.
tenant:
  id: ""

# ─── Cluster identity ──────────────────────────────────────
cluster:
  # Human-readable label emitted alongside cluster_id. The UI
  # prefers its own kubeconfig context name, so this is mostly for
  # operators querying VictoriaMetrics directly.
  name: ""
  # Override the auto-discovered cluster_id (kube-system namespace
  # UID). Leave empty unless migrating a legacy install that emitted
  # a different value historically.
  id: ""

# ─── Hubble flow collector ─────────────────────────────────
hubble:
  # Kill-switch. Set to false to disable flow collection without
  # uninstalling the chart. Default true.
  #
  # IMPORTANT — set this explicitly to `false` on clusters that do
  # NOT run Cilium (e.g. EKS with AWS VPC CNI, GKE without managed
  # Dataplane V2, AKS with kubenet). Leaving it `true` makes the
  # agent dial `hubble-relay.kube-system.svc.cluster.local:80`
  # forever; DNS returns NXDOMAIN and the agent emits one WARN per
  # node per ~minute indefinitely:
  #
  #   WARN  hubble: stream ended, will retry  relay=hubble-relay...
  #     error="rpc error: code = Unavailable desc = name resolver
  #     error: produced zero addresses"  backoff=1m0s
  #
  # The Reliability dashboard (L7 HTTP / Network Drops) is hidden
  # automatically when no Hubble samples reach VictoriaMetrics, so
  # disabling here loses NO user-visible feature on those clusters
  # — only the noise.
  #
  # Quick check whether Cilium is present:
  #   kubectl -n kube-system get pods -l k8s-app=cilium
  #
  # When Cilium IS present (or later gets installed), leave true.
  # If you disable now and add Cilium later:
  #   helm upgrade --reuse-values --set hubble.enabled=true
  enabled: true
  relay:
    # Override the relay address. Empty = use the agent default
    # (hubble-relay.kube-system.svc.cluster.local:80).
    #
    # Common overrides:
    # - GKE managed Dataplane V2:
    #     hubble-relay.gke-managed-dpv2-observability.svc.cluster.local:443
    # See README → "Deploying on GKE managed Dataplane V2" for the
    # full setup (relay is mTLS-only in that environment and the
    # client-certs Secret lives in a different namespace — three
    # mirror options documented there).
    address: ""
    tls:
      # Mount an existing Secret with keys ca.crt / tls.crt / tls.key.
      # Presence of ca.crt enables TLS; tls.crt+tls.key enable mTLS.
      # Leave empty for insecure plaintext (acceptable inside the pod
      # network).
      #
      # The Secret MUST live in the agent's release namespace —
      # cross-namespace Secret mounting is a K8s no-go. When the
      # source Secret lives elsewhere (GKE managed DPv2 is the
      # canonical case), pick one of the three documented mirror
      # paths in the README:
      # 1. Manual one-shot kubectl mirror (quick start, not stable
      #    across cert rotation).
      # 2. External Secrets Operator (production path — clean
      #    declarative pull from the source Secret).
      # 3. Reflector (lightweight controller — annotation-driven
      #    push from source to mirror).
      existingSecret: ""
      # SNI / verification hostname. Empty defaults to the dial target.
      # For GKE managed DPv2 set to:
      #   hubble-relay.gke-managed-dpv2-observability.svc
      serverName: ""

# ─── Scrape sidecar (vmagent) ───────────────────────────────
# Phase 2 of the Universal Data Plane Plan. When enabled the
# DaemonSet pod gets a vmagent sidecar that scrapes Prom-compatible
# /metrics endpoints in the cluster (kube-state-metrics, node-
# exporter, app pods carrying prometheus.io/scrape: "true") and
# remote_writes the samples to KubeBolt's /api/v1/prom/write.
#
# Day 2 of Phase 2 (this release) ships the sidecar with an empty
# scrape_configs file — operators get the container running but no
# targets are scraped yet. Day 3 fills in the service-discovery
# defaults (kube-state-metrics, node-exporter, annotation-driven
# pods) keyed off the values below.
#
# ─── Agent runtime knobs ───────────────────────────────────────
# Set deferNodeNetwork=true when you're shipping metrics into
# KubeBolt from an EXTERNAL Prometheus that scrapes node-exporter
# (the topology documented in docs/integrations/prometheus.md).
# Without this flag, the agent's kubelet /stats/summary and the
# external node-exporter scrape both emit
# node_network_*_bytes_total under identical labels, and queries
# like `sum(rate(node_network_*[1m]))` in Capacity and Node
# Monitor panels read 2×.
#
# When true: the agent suppresses node_network_receive_bytes_total
# and node_network_transmit_bytes_total only. Everything else
# keeps emitting — including container_*, which the UI's Pod
# and Workload Monitor charts depend on for the agent's
# workload_kind / workload_name label enrichment (Prom kubelet
# scrape doesn't add those labels, so deferring container_* would
# leave Workload Monitor empty).
#
# Note on container_* duplication when an external Prom scrapes
# the kubelet: the agent's container_* series and Prom's kubelet
# container_* series coexist in VM. The UI works around this on
# the chart side by filtering `job=""` (agent-only) in Pod and
# Workload Monitor queries, so duplication doesn't show. Future
# Workload Monitor re-engineering (Phase 4+) will derive workload
# attribution from kube-state-metrics, allowing safe agent
# deferral on container_*; until then the chart-side filter is
# the canonical fix.
#
# Default off — Phase 2's sidecar-driven path (scrape.enabled +
# scrape.discovery.nodeExporter.enabled, below) already wires the
# defer env var for the bundled vmagent topology. Set this value
# explicitly only when the bundled sidecar is OFF and an external
# Prometheus is the canonical node-exporter scraper.
agent:
  deferNodeNetwork: false

  # Mode C — agent reads from the customer's existing Prometheus via
  # /api/v1/query_range instead of running a scrape sidecar. 1.13's
  # flagship; see internal/roadmap-1.13.md § Sprint 1 for design.
  #
  # MUTUALLY EXCLUSIVE with `scrape.enabled=true`. The chart hard-fails
  # at `helm template` if both are on — a single agent must have one
  # canonical source of samples, never two. The check lives in
  # _helpers.tpl § kubebolt-agent.validatePromRead and is included
  # near the top of this DaemonSet template.
  #
  # Air-gapped + on-prem use cases stay on `scrape.enabled=true` (the
  # bundled vmagent sidecar). Mode C is for customers running managed
  # Prometheus (AMP / Azure Monitor / GMP — S2) or self-managed Prom
  # whose config they can't edit to add a remote_write block.
  promRead:
    enabled: false
    # Customer Prom endpoint, e.g. "http://prometheus.monitoring:9090".
    # No trailing slash needed — the client appends /api/v1/query_range.
    url: ""

    auth:
      # Supported modes (verified end-to-end in pre-flight sessions
      # 08/09/10, 2026-05-26 / 27):
      #
      #   none                    — anonymous (self-managed Prom with
      #                             no auth in front)
      #   basicAuth               — HTTP Basic; requires
      #                             basicAuthUsername + basicAuthPassword
      #   bearer                  — static bearer token; requires bearerToken
      #   gcpIam                  — GMP managed; ambient via Workload
      #                             Identity (pod KSA annotated with
      #                             iam.gke.io/gcp-service-account=...)
      #   azureWorkloadIdentity   — Azure Monitor managed; ambient via
      #                             Workload Identity (pod label
      #                             azure.workload.identity/use=true +
      #                             KSA annotated with
      #                             azure.workload.identity/client-id=...)
      #   awsSigV4                — AWS AMP; ambient via IRSA (pod KSA
      #                             annotated with
      #                             eks.amazonaws.com/role-arn=...) +
      #                             requires awsRegion below
      mode: none
      basicAuthUsername: ""
      # WARNING — plain values.yaml is fine for kind smoke tests but
      # NOT for production credentials. For Secret-backed credentials,
      # leave these empty and inject the env vars via the chart's
      # `extraEnv` escape hatch with a valueFrom.secretKeyRef block.
      basicAuthPassword: ""
      bearerToken: ""
      # Required when mode=awsSigV4. AMP endpoints are region-scoped
      # (https://aps-workspaces.<region>.amazonaws.com/...) and SigV4
      # signs against the region; mismatch produces 403 InvalidSignature.
      # Ignored for other modes.
      awsRegion: ""

    # Cadence the agent fires query_range at. Lower values increase
    # query load on the customer's Prom — 30s mirrors the load
    # profile of one extra Grafana client.
    pollInterval: 30s
    # query_range `step` parameter (resolution of the returned
    # matrix). Align to the customer's scrape_interval to avoid
    # sub-sample interpolation.
    step: 30s
    # How far back each query_range window extends from "now".
    # Should be ≥ pollInterval + small slack so consecutive polls
    # overlap and gap-recover from transient Prom failures.
    lookback: 60s

    # Selectivity — what to pull from the customer's Prom.
    #
    # Mode A (the DaemonSet pods' kubelet collectors) ALREADY produces
    # the KubeBolt-named metrics the UI's curated panels consume
    # (node_fs_used_bytes, node_memory_working_set_bytes, container_*,
    # pod_*). The defaults here are SURGICAL — they fetch only what
    # Mode A doesn't generate, avoiding the double-storage cost of
    # shipping raw Prom names that duplicate Mode A's data.
    #
    # Default coverage:
    #   - kube_*                  full kube-state-metrics surface
    #   - node_load.*             load average (1/5/15)
    #   - node_pressure_.*        PSI — kernel stress signal
    #   - node_disk_.*            disk I/O detail
    #   - node_network_.*_errs_.* network errors
    #   - up, process_*           target health + process self-metrics
    #
    # Keep this list and the Go constant DefaultMatchers in
    # packages/agent/internal/promread/config_env.go in lockstep.
    # Operators add app-custom metrics or wider node-exporter surface
    # by appending; an empty list (or omitting the key entirely) falls
    # back to the same defaults.
    matchers:
      - '{__name__=~"kube_.*"}'
      - '{__name__=~"node_load.*|node_pressure_.*"}'
      - '{__name__=~"node_disk_.*|node_network_.*_errs_.*"}'
      - '{__name__=~"up|process_.*"}'

    # Deployment-pod–specific values for the promread workload. The
    # promread Deployment is single-replica (Lease-elected),
    # scheduled by k8s default unless nodeSelector/affinity narrow
    # it. Resources are lighter than the DaemonSet's because
    # promread doesn't run kubelet collectors locally.
    deployment:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 1000m
          memory: 256Mi
      nodeSelector: {}
      tolerations: []
      affinity: {}

# Default off — Phase 2 is opt-in until the receiver path is
# blinded with auth in Phase 3.
scrape:
  enabled: false
  image:
    repository: victoriametrics/vmagent
    # Tracks the same VictoriaMetrics line as the bundled VM in the
    # kubebolt chart (deploy/helm/kubebolt). Both pins are listed in
    # CLAUDE.md "Third-party image pins" table; the release pipeline's
    # preflight-third-party-scan now Trivy-scans both and fails on drift.
    tag: v1.143.0
    pullPolicy: IfNotPresent
  # Where vmagent ships scraped samples. Typically the kubebolt
  # backend's remote_write receiver:
  #   http://kubebolt.kubebolt.svc.cluster.local/api/v1/prom/write
  # Empty disables the upstream — the sidecar still runs and scrapes,
  # but samples are dropped (useful for dry-run validation of the
  # scrape config without filling VM with cardinality).
  remoteWriteUrl: ""
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # vmagent CLI flags rendered as -key=value. Use this to set
  # any vmagent knob not already covered by a dedicated value below.
  # See: https://docs.victoriametrics.com/vmagent.html#advanced-usage
  extraArgs: {}

  # ── Cardinality limits ──
  # Defensive caps to keep one misconfigured target (an app
  # exposing per-request-id labels, a buggy library spamming
  # unique gauges) from filling VictoriaMetrics' index. Each cap
  # rejects samples beyond the limit with a vmagent log line —
  # operators see the rejection and can either fix the target,
  # raise the cap, or filter the high-cardinality label via
  # metricRelabelConfigs below.
  limits:
    # Maximum scrape body size in bytes. Default 16 MiB matches
    # vmagent's default; lower it to catch runaway exporters
    # earlier.
    maxScrapeSize: 16777216  # 16 MiB
    # Maximum unique samples per (job, target) per scrape. A
    # well-behaved exporter (kube-state-metrics, node-exporter,
    # most apps) stays well under this. Single-target overshoot
    # logs a warning; if it persists, raise the cap or relabel.
    maxSeriesPerTarget: 30000
    # Soft cap on TOTAL active series across all scrape targets.
    # vmagent rejects new series past the cap (existing series
    # keep updating) and emits an alert metric. Set to 0 to
    # disable the global cap and rely on per-target only.
    maxSeriesGlobal: 1000000

  # ── Sample relabeling ──
  # Drop high-cardinality labels at scrape time before they hit
  # VictoriaMetrics. The defaults strip a few labels we know are
  # noisy and rarely useful for queries (instance hash suffixes,
  # k8s replicaset hashes that already collapse to workload
  # labels via Phase 1's UI). Operators can append more.
  metricRelabelConfigs: []
  # Example to add to the list:
  #   - source_labels: [my_high_card_label]
  #     action: labeldrop
  #     regex: my_high_card_label

  # ── Service discovery ──
  # Built-in scrape jobs that vmagent renders into the ConfigMap.
  # Each one is independently toggleable so operators can pick
  # only what their cluster has installed.
  discovery:
    # Annotation-driven pod discovery — every pod with
    # `prometheus.io/scrape: "true"` gets scraped on the port +
    # path it advertises (`prometheus.io/port`,
    # `prometheus.io/path`, default 80 / /metrics). Filtered to
    # the local node (per ADR-003) so each vmagent scrapes only
    # its own pods, avoiding N-way duplicate samples in clusters
    # with N nodes.
    pods:
      enabled: true
    # Node-exporter — per-node metrics about the host (CPU, mem,
    # filesystem, network at the OS level). Works perfectly with
    # the sidecar model: each vmagent scrapes only the
    # node-exporter pod on its own node. Default off because
    # not every cluster runs node-exporter; enable when you do.
    nodeExporter:
      enabled: false
      # Label selector to find node-exporter pods. Default works
      # with the standalone prometheus-community/prometheus-node
      # -exporter chart, which labels its pods
      # `app.kubernetes.io/name=node-exporter`.
      #
      # IMPORTANT — kube-prometheus-stack uses the SAME node-
      # exporter subchart but ships it under a different label.
      # If you installed Prometheus via kube-prometheus-stack
      # (which is the most common production path), override to:
      #
      #   labelSelector: "app.kubernetes.io/name=prometheus-node-exporter"
      #
      # To check what label your cluster uses, run:
      #
      #   kubectl get pods -A -l app.kubernetes.io/name=node-exporter -o name
      #   kubectl get pods -A -l app.kubernetes.io/name=prometheus-node-exporter -o name
      #
      # The match is enforced via a vmagent relabel rule (action:
      # keep) — a wrong selector results in ZERO scraped targets
      # with NO error logged anywhere. If host CPU / memory /
      # disk panels are empty in the Capacity dashboard, this is
      # the first thing to check.
      labelSelector: "app.kubernetes.io/name=node-exporter"
      port: 9100
      path: /metrics
    # kube-state-metrics — cluster-scoped (one Deployment, not
    # per-node). Two ways to get its samples into VM without
    # duplicating across N vmagent sidecars:
    #
    #   RECOMMENDED — annotation-driven discovery. The official
    #   KSM chart and bundled manifests set
    #   `prometheus.io/scrape: "true"` on the KSM pod. The
    #   kubernetes-pods scrape job above (filtered to local node)
    #   then scrapes KSM exactly once: from whichever vmagent
    #   sidecar happens to share a node with the KSM pod. No
    #   leader election needed; the per-node filter does the work.
    #
    #   FALLBACK — enable this dedicated job. Use ONLY if your
    #   KSM deployment doesn't carry the annotation and you can't
    #   add it. Without VictoriaMetrics-side deduplication
    #   (`-dedup.minScrapeInterval` on vmstorage / vminsert) this
    #   will produce N×duplicate series in clusters with N nodes.
    #   The kubebolt helm chart enables VM dedup by default at
    #   the matching scrape interval, so the duplicates collapse
    #   server-side — but if you're shipping samples to your own
    #   VM cluster, configure dedup there or expect inflated
    #   series counts.
    kubeStateMetrics:
      enabled: false
      # Label selector to find the KSM pod. Default matches both
      # the standalone prometheus-community/kube-state-metrics
      # chart AND kube-prometheus-stack (which bundles KSM as a
      # subchart and preserves the `kube-state-metrics` name
      # label without prefixing it — unlike node-exporter above).
      #
      # If you run a custom KSM deployment with a different label,
      # check yours with:
      #
      #   kubectl get pods -A -l app.kubernetes.io/name=kube-state-metrics -o name
      #
      # Like the node-exporter selector, a mismatch here results
      # in ZERO scraped KSM targets with NO error logged. If
      # workload-attribution panels (Top Consumers, Right Sizing)
      # are empty after install, verify this selector and the
      # annotation path above.
      labelSelector: "app.kubernetes.io/name=kube-state-metrics"
      port: 8080
      path: /metrics

# ─── Scheduling ────────────────────────────────────────────
# The agent needs to land on every node (including control-plane) so
# it can reach each kubelet. Defaults match the dev manifest; override
# if you have nodes that shouldn't run the agent.
tolerations:
  - operator: Exists
nodeSelector: {}
affinity: {}

# ─── Priority class ─────────────────────────────────────────
#
# When the agent's pod can't be scheduled on a node (CPU/memory
# pressure pushes it Pending), KubeBolt's Monitor view loses
# visibility for the workloads on that node and the chart-level
# sums understate per-pod usage. The Monitor UI shows a coverage-
# gap banner when this happens, but the cleanest fix is to give
# the agent a PriorityClass so the kube-scheduler can preempt
# lower-priority pods to make room.
#
# Three install modes:
#
#   1. priority.enabled: false (DEFAULT — no preemption)
#      Safest for security-conscious shops. Agent runs only when
#      a node has spare resources at scheduling time. The Monitor
#      banner alerts the operator when coverage gaps appear.
#
#   2. priority.enabled: true with empty className (chart-managed)
#      The chart creates a PriorityClass `<release>-priority` at
#      value 999999000 — high enough to preempt user workloads
#      without explicit PriorityClass (priority=0), but NOT in the
#      `system-*` namespace that some OPA/Kyverno policies flag.
#      Recommended for shops that want full coverage but have
#      strict policy on system-* classes.
#
#   3. priority.enabled: true with className="system-cluster-critical"
#      (or any other pre-existing class). Skips chart-managed
#      class; uses what you point at. `system-cluster-critical`
#      gives the highest practical priority but some auditors
#      flag it outside `kube-system`.
#
# Mode 1 is the safest default. When you see coverage banners
# in Monitor consistently, switch to mode 2.
priority:
  enabled: false
  # When enabled and className is empty, the chart creates a
  # PriorityClass with the value below.
  className: ""
  value: 999999000

# Legacy single-string knob, kept for backwards compatibility with
# pre-0.3.0 installs. If set, takes precedence over `priority.*`
# block above (the chart writes this string verbatim into the
# pod spec). For new installs, prefer `priority.enabled` +
# `priority.className`.
priorityClassName: ""

# ─── Resources ─────────────────────────────────────────────
# Bumped 2026-05-17 after pprof investigation. Heap allocation churn
# from Hubble flow parsing is ~200 MB/min on an active node; live
# heap stays ~5 MiB but Go retains HeapSys (committed-but-idle pages)
# unless GOMEMLIMIT pushes the scavenger. Resulting steady-state
# working set lands at 50-70 MiB depending on flow rate + pod count.
# The 30Mi/80Mi defaults were sized when the agent was kubelet-only;
# adding Hubble + proxy + scrape pushed the realistic floor up.
resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

# ─── Pod tuning ────────────────────────────────────────────
podAnnotations: {}
podLabels: {}
# Updated on every release so a `helm upgrade` rotates pods even when
# only env values change. Leave false to keep Helm's default rolling
# behavior based on template diffs.
podAnnotationChecksum: true

# ─── Security ──────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

# ─── RBAC + SA ─────────────────────────────────────────────
serviceAccount:
  create: true
  # Empty = derive from the release name.
  name: ""
  annotations: {}
rbac:
  # Create the ClusterRole/ClusterRoleBinding tiers and the Role
  # /RoleBinding for Lease-based leader election. Set to false if
  # your shop provisions RBAC out of band.
  create: true

  # ─── Permission tier (3 modes, picks the agent SA's scope) ───
  #
  # metrics  — narrow ClusterRole: kubelet stats + pods list/watch +
  #            namespaces get. The agent ships kubelet metrics +
  #            Hubble flows; nothing else leaves the cluster. Privacy-
  #            conscious default for orgs that don't want any
  #            apiserver call to traverse the agent's tunnel.
  #            Implies proxy.enabled=false unless overridden.
  #
  # reader   — cluster-wide get/list/watch on `*/*`. The backend
  #            reads inventory through the agent's SPDY tunnel; write
  #            verbs come back 403. Pick this when the cluster's
  #            apiserver isn't directly reachable from the backend
  #            and you want full read-only dashboard. Implies
  #            proxy.enabled=true (mandatory).
  #
  # operator — wildcard read+write on `*/*`. Effectively cluster-admin
  #            scoped to the agent SA. Required for exec / scale /
  #            restart / delete / YAML edit through the dashboard.
  #            REQUIRES auth.mode != "disabled" — without auth,
  #            anyone who can dial the backend's gRPC port pivots to
  #            cluster-admin in this cluster. Implies
  #            proxy.enabled=true (mandatory).
  mode: reader

# ─── K8s API proxy ─────────────────────────────────────────
# The agent advertises a `kube-proxy` capability on its outbound
# gRPC channel; when on, the backend can route apiserver calls
# through the tunnel. This is the only mechanism by which the
# backend reaches a cluster whose apiserver isn't publicly
# routable.
#
# Auto-derived from rbac.mode (off for metrics, on for
# reader/operator) unless overridden here. Overriding to false
# while rbac.mode=reader|operator fails the template — those
# modes only make sense WITH the proxy.
proxy: {}
  # enabled: true   # explicit override; defaults to rbac.mode-derived

# ─── Backend authentication (Sprint A) ─────────────────────
# How the agent identifies itself to the backend. The backend's
# KUBEBOLT_AGENT_AUTH_MODE setting controls whether unauthenticated
# connections are allowed (disabled / permissive / enforced).
auth:
  # disabled        — no credentials. Backend must allow unauthenticated
  #                   connections (Sprint 0 migration default).
  # tokenreview     — projected SA token, validated by the backend via
  #                   the apiserver TokenReview API. Requires the backend
  #                   to live in the same cluster as this agent.
  # ingest-token    — long-lived bearer token issued by the backend admin
  #                   UI. Required for SaaS / cross-cluster deployments
  #                   where the backend cannot reach this cluster's
  #                   apiserver.
  mode: disabled

  # Used when mode=tokenreview. Kubelet mints a projected token with
  # this audience; the backend rejects mismatching audiences.
  tokenReview:
    audience: kubebolt-backend
    expirationSeconds: 3600  # kubelet renews well before expiry

  # Used when mode=ingest-token. The operator creates a Secret out of
  # band — the chart never sees the plaintext.
  #   kubectl create secret generic kubebolt-ingest-token \
  #     --from-literal=token=kb_xxxxxxxx
  ingestToken:
    existingSecret: ""
    key: token

# ─── Transport security to backend ──────────────────────────
# Encrypts the gRPC dial. Independent from auth.mode — combining
# auth + plaintext is permitted (the agent logs a WARN at startup)
# but only sane for dev / trusted internal networks.
#
# ENTERPRISE-CANDIDATE (mTLS): plain server-cert TLS stays OSS;
# the mTLS path (clientCertSecret) is a candidate to move behind a
# license gate when the SaaS hospedado launches.
tls:
  enabled: false
  # CA bundle to verify the backend's server cert. Empty means use the
  # system trust store (right for SaaS with a public CA chain).
  caSecret: ""
  caKey: ca.crt
  # mTLS — agent presents a client cert. The backend's TLS_CLIENT_CA
  # configuration decides whether it's required or optional.
  clientCertSecret: ""
  clientCertKey: tls.crt
  clientKeyKey: tls.key
  # SNI override. Empty = derive from backendUrl host.
  serverName: ""

# ─── Logging ───────────────────────────────────────────────
logLevel: info  # debug | info | warn | error

# ─── Extras ────────────────────────────────────────────────
# Inject arbitrary env vars into the agent container. Useful for
# features we don't have first-class Helm fields for yet.
#
# GOMEMLIMIT default — added 2026-05-17 to address a memory retention
# pattern surfaced in the field: high allocation churn from Hubble
# flow parsing (~200 MB/min steady-state) makes Go expand HeapSys but
# the scavenger is lazy returning idle pages to the OS without an
# explicit memory target. Setting GOMEMLIMIT slightly below
# resources.limits.memory makes GC + scavenger aggressive enough that
# working_set stabilizes well under the limit. Costs ~5-10% extra CPU
# in GC under load — acceptable since the agent's CPU baseline is
# ~5-10m. Remove this entry only when overriding limits.memory
# significantly higher (eg. >256Mi) where the scavenger pressure
# becomes counterproductive.
extraEnv:
  - name: GOMEMLIMIT
    value: "100MiB"
# Append your own env vars below the chart default — operators who
# want to OVERRIDE GOMEMLIMIT entirely should set this list directly.
# Example to add log-level override alongside the default:
#   extraEnv:
#     - name: GOMEMLIMIT
#       value: "100MiB"
#     - name: KUBEBOLT_AGENT_LOG_LEVEL
#       value: debug

# Override chart-derived names when needed.
nameOverride: ""
fullnameOverride: ""
