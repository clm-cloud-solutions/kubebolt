# KubeBolt Helm Chart Values
#
# ─── UI-first config model (spec #09 V1 + V2, 2026-05-24) ────────────
# KubeBolt ships an admin Settings UI that edits the following domains
# at runtime — no redeploy needed:
#
#   - AI Copilot           (provider, model, API key, fallback, budget)
#   - Notifications        (Slack, Discord, SMTP, severity gates)
#   - Auth                 (JWT TTLs — restart required to apply)
#   - General              (display name, refresh interval, prod-namespace regex)
#   - Agents & Ingest      (agent gRPC auth mode, rate limit, autoregister,
#                           prune horizon, remote_write receiver gate +
#                           auth mode + fleet defaults, SPDY tunnel idle)
#                           Three fields restart-required (auth mode +
#                           token audience + mTLS); rest hot-reload.
#   - Per-tenant overrides (Settings → Agents & Ingest, bottom card)
#
# Values stored via the UI OVERRIDE the env baseline this chart sets
# on every read. You can leave every UI-domain value in this file
# empty and configure end-to-end from the UI after first login.
#
# ─── What you STILL set here (BOOT-TIME / infra-bound) ───────────────
#   - api/web image, resources, networking
#   - service / ingress
#   - serviceAccount / RBAC
#   - agentIngest.port / agentIngest.tls (filesystem paths)
#   - metrics.storage (PVC, image, retention)
#   - auth.adminPassword + auth.jwtSecret + auth.persistence
#     (first-boot seed + signing key + data dir)
#
# ─── What you CAN set here but BETTER via UI ─────────────────────────
#   - copilot.*               (Settings → AI Copilot)
#   - notifications via extraEnv  (Settings → Notifications)
#   - access/refresh token TTLs via extraEnv  (Settings → Auth)
#   - display name + refresh defaults via extraEnv  (Settings → General)
#   - agentIngest.authMode + .autoRegisterClusters + .rateLimit.*
#       (all in Settings → Agents & Ingest now)
#   - metrics.remoteWrite.enabled + .authMode  (Settings → Agents & Ingest)
#
# To inspect what env vars THIS chart actually wires into the container,
# log into the UI as admin and open Settings → "Boot snapshot" — it
# now groups vars into BOOT-TIME and RUNTIME tiers with category
# subheadings for fast scanning.

# API backend
api:
  image:
    repository: ghcr.io/clm-cloud-solutions/kubebolt/api
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Web frontend (nginx)
web:
  image:
    repository: ghcr.io/clm-cloud-solutions/kubebolt/web
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  port: 3000
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi

# Service configuration for the main HTTP service (web UI + API behind
# nginx proxy in the web pod).
service:
  type: ClusterIP
  port: 80
  # Pinned NodePort when service.type=NodePort. Empty = let Kubernetes
  # auto-assign from the 30000-32767 range; that's fine when the UI is
  # reached through cluster-internal DNS or via `kubectl port-forward`,
  # but breaks any external reverse-proxy / LB / firewall config that
  # needs a stable port (e.g. caddy fronting the UI on a single-node
  # k3s VM alongside the agent-ingest gRPC channel). Set to a specific
  # value in that case. Ignored when type != NodePort. Same shape as
  # agentIngest.service.nodePort below.
  nodePort: ""

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: kubebolt.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ServiceAccount for API to access the cluster
serviceAccount:
  create: true
  name: ""
  annotations: {}

# RBAC — create ClusterRole with read access to all resources
rbac:
  create: true

# Agent ingest gRPC channel (Sprint A).
# Receives telemetry from kubebolt-agent DaemonSet instances. The
# authentication interceptor lives inside the API process; this block
# controls how it is exposed to the cluster network.
agentIngest:
  enabled: true
  port: 9090

  # Enforcement matrix for the agent auth interceptor:
  #   disabled    — accept every connection (Sprint 0 migration default)
  #   permissive  — try to authenticate; on failure, log + accept
  #   enforced    — reject any unauthenticated connection
  authMode: disabled

  # Auto-register an "agent-proxy" cluster in the cluster switcher when
  # an agent advertises the kube-proxy capability. With this on, every
  # agent that successfully authenticates surfaces its cluster in the
  # UI selector without operator action.
  #
  # Default = true because the alternative (false) creates a hidden
  # paper-cut: integrations whose detection probes are scoped to the
  # active cluster (Mode C "Prometheus (read)" most prominently, but
  # also the future per-cluster cards) silently report NotInstalled
  # because the agent's cluster never becomes the active context.
  # Data still flows, but the operator can't tell from the UI.
  #
  # Set to false ONLY for SaaS multi-tenant deployments where an admin
  # wants to manually approve each agent before it appears in the UI
  # selector — e.g. compliance regimes that require an explicit
  # human-in-the-loop step after the ingest-token auth handshake.
  #
  # Maps to env KUBEBOLT_AGENT_AUTOREGISTER_CLUSTERS on the API
  # container.
  autoRegisterClusters: true

  # Audience the apiserver-issued projected SA token must carry. Must
  # match auth.tokenReview.audience in the kubebolt-agent chart.
  tokenAudience: kubebolt-backend

  service:
    # Expose the gRPC port as a separate Service so agents (DaemonSets,
    # external clusters via LoadBalancer, etc.) can reach it without
    # piggy-backing on the HTTP service.
    create: true
    type: ClusterIP
    # Pinned NodePort when service.type=NodePort. Empty = let
    # Kubernetes auto-assign from the 30000-32767 range; that's fine
    # when the agent reaches this Service through cluster-internal
    # DNS (kubebolt-agent-ingest.<ns>.svc), but breaks any external
    # reverse-proxy / LB / firewall config that needs a stable port
    # (e.g. caddy fronting the gRPC channel on a single-node k3s VM).
    # Set to a specific value in that case. Ignored when type != NodePort.
    nodePort: ""

  rbac:
    # Adds tokenreviews/create to the backend ClusterRole. Required when
    # any agent uses auth.mode=tokenreview. Set false in SaaS deployments
    # that only accept ingest tokens (BearerIngest mode).
    enableTokenReview: true

  # Per-tenant rate limiting on the agent ingest channel.
  #
  # ENTERPRISE-CANDIDATE (plan-aware policies):
  # The token-bucket algorithm itself stays OSS — operators get a single
  # global limit. Per-tenant plan-based policies (free / team / enterprise
  # with distinct thresholds) are a candidate to move behind a license
  # gate when the SaaS hospedado launches.
  rateLimit:
    enabled: false
    requestsPerSec: 1000
    burst: 2000

  # Transport security for the agent channel.
  #
  # ENTERPRISE-CANDIDATE (mTLS): plain TLS (server cert only) stays OSS;
  # the client cert verification path (clientCASecret + requireClientCert)
  # is a candidate to move behind a license gate when the SaaS hospedado
  # launches.
  tls:
    enabled: false
    # Secret with tls.crt + tls.key for the server certificate.
    existingSecret: ""
    # Optional CA bundle to validate client certs (mTLS).
    clientCASecret: ""
    # When true, the server rejects clients without a verified cert.
    requireClientCert: false

# ─── Metrics storage (VictoriaMetrics) ────────────────────────────
# KubeBolt persists time-series data (CPU / memory / network samples
# from the agent, Hubble flow events) in a Prometheus-compatible TSDB.
# By default the chart deploys an embedded single-node VictoriaMetrics
# StatefulSet so installs work out of the box. For larger clusters or
# clusters that already run a metrics backend, disable the embedded
# instance and point externalUrl at your existing endpoint.
metrics:
  storage:
    embedded:
      # Deploy a bundled single-node VictoriaMetrics StatefulSet. Set
      # to false when you already run VictoriaMetrics, Prometheus
      # remote-write target, vmagent, or any compatible TSDB and want
      # KubeBolt to write there instead.
      enabled: true
      image:
        repository: victoriametrics/victoria-metrics
        tag: v1.145.0-scratch
        pullPolicy: IfNotPresent
      # Data retention. Anything older than this is dropped to keep the
      # PVC bounded. Increase if you need historical analysis windows
      # longer than 30 days; remember to scale `persistence.size` too.
      retention: 30d
      # Persistent volume for /victoria-metrics-data. Sizing rule of
      # thumb: ~1 GB per 100 pods at 30-day retention with default
      # KubeBolt scrape cadence. Adjust upward for high-cardinality
      # workloads (lots of label dimensions).
      persistence:
        enabled: true
        size: 10Gi
        storageClass: ""      # uses cluster default if empty
        accessModes:
          - ReadWriteOnce
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 2Gi
      # Extra args passed to the VictoriaMetrics binary. The chart
      # already provides --storageDataPath, --retentionPeriod,
      # --httpListenAddr, and --dedup.minScrapeInterval=30s
      # (collapses N×duplicate kube-state-metrics samples produced
      # by the multi-vmagent DaemonSet pattern). Anything you add
      # here is appended. To DISABLE dedup (e.g. when running a
      # single vmagent and you want raw sample density), pass
      # --dedup.minScrapeInterval=0 here — explicit override wins.
      extraArgs: []
    # External TSDB URL — used when embedded.enabled is false. Must
    # support the VictoriaMetrics ingestion API ("/api/v1/import" and
    # "/api/v1/query"); plain Prometheus remote-write is not enough,
    # since KubeBolt also queries it back. Examples:
    #   http://victoria-metrics.observability.svc.cluster.local:8428
    #   https://vmselect.example.com
    externalUrl: ""
  # Prom remote_write receiver (Phase 2 of the Universal Data Plane
  # Plan). When enabled, the backend exposes POST /api/v1/prom/write
  # so a kubebolt-agent v1.0+ vmagent sidecar can ship scraped
  # samples directly into VM. Default off — Phase 2 stages the path
  # without auth and we don't want to expose an unauthenticated
  # ingest port on existing installs by accident. Phase 3 will
  # replace this gate with a bearer-token middleware + per-tenant
  # cardinality limits.
  remoteWrite:
    enabled: false
    # Three-tier enforcement for the bearer middleware on the
    # /api/v1/prom/write endpoint. Mirrors the gRPC channel's
    # AGENT_AUTH_MODE semantics (auth.agentAuthMode in this chart).
    # Values: disabled | permissive | enforced. Default disabled
    # for Sprint A migration compatibility — flip to enforced once
    # operators have provisioned ingest tokens via the agent
    # integration's "Generate token + create Secret" flow. The
    # backend uses the SAME TenantsStore for both surfaces, so
    # operators get one token to manage, two consumers (agent
    # gRPC + vmagent HTTP).
    authMode: disabled

# Number of replicas
replicaCount: 1

# Authentication configuration
# Built-in username/password auth with roles (Admin, Editor, Viewer).
# Enabled by default. Set enabled: false for open access (no login required).
auth:
  enabled: true
  adminPassword: ""       # initial admin password — generated if empty (printed to logs + persisted to a Secret on first boot)
  jwtSecret: ""           # JWT signing secret — generated if empty (tokens won't survive restarts)
  existingSecret: ""      # name of an existing Secret containing 'admin-password' and/or 'jwt-secret'

  # Forgot-password recovery: set this on a `helm upgrade` to reset the
  # admin user's password to the given value at next pod start. With
  # strategy=Recreate, the old pod terminates first (releasing the
  # BoltDB lock), the new pod runs the reset, then continues normal
  # boot. Remove this value on the next upgrade so it doesn't persist
  # in your release values.
  #
  #   helm upgrade kubebolt ... --reuse-values --set auth.resetAdminPassword=NEWPASS
  #   # log in, change to your real password from the Account menu
  #   helm upgrade kubebolt ... --reuse-values --set auth.resetAdminPassword=
  resetAdminPassword: ""
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""      # uses cluster default if empty
    accessModes:
      - ReadWriteOnce

# AI Copilot configuration
#
# DEPRECATED — prefer Settings → AI Copilot in the UI. The fields below
# still work as a boot-time baseline (useful for GitOps / config-as-code
# workflows that want to seed an install without manual UI steps), but
# every value here is editable at runtime from the admin UI without a
# redeploy. UI overrides win over these values on every read.
#
# The copilot uses the user's own LLM provider API key — no
# KubeBolt-managed AI service. Leave apiKey empty to disable the
# copilot entirely. KubeBolt itself works fully without the copilot.
copilot:
  enabled: false
  provider: anthropic     # anthropic | openai | custom
  model: ""               # optional — uses provider default if empty
  baseUrl: ""             # optional — for custom/self-hosted endpoints
  maxTokens: 4096
  # API key — recommended to set via existingSecret rather than apiKey
  apiKey: ""
  existingSecret: ""      # name of an existing Secret containing 'api-key'

  # Optional fallback model — used when the primary fails (rate limits,
  # 5xx errors, network issues). Can be a different provider or just a
  # cheaper/smaller model from the same provider.
  fallback:
    enabled: false
    provider: ""          # anthropic | openai | custom (defaults to primary)
    model: ""             # required if fallback.enabled is true
    baseUrl: ""
    apiKey: ""
    existingSecret: ""    # name of Secret containing 'api-key' for fallback

# Arbitrary env vars injected into the API container. Escape hatch for
# KUBEBOLT_* knobs that don't (yet) have first-class chart values —
# avoids forcing a chart template change per new env var the binary
# learns to read. Same shape as the kubebolt-agent chart's extraEnv.
#
# Example:
#   extraEnv:
#     - name: KUBEBOLT_AGENT_REGISTRY_PRUNE_HORIZON
#       value: "48h"
#     - name: KUBEBOLT_AGENT_TUNNEL_IDLE_TIMEOUT
#       value: "10m"
#     # Agent-proxy resilience timeouts (widen under heavy agent concurrency, tighten to
#     # fail faster). Connect deadline / stuck-watchdog (0 disables) / request fallback.
#     - name: KUBEBOLT_AGENT_PROXY_CONNECT_TIMEOUT
#       value: "25s"
#     - name: KUBEBOLT_AGENT_PROXY_STUCK_TIMEOUT
#       value: "45s"
#     - name: KUBEBOLT_AGENT_PROXY_REQUEST_TIMEOUT
#       value: "30s"
#     # Air-gapped installs: disable the GitHub update-check so the
#     # backend never reaches out to api.github.com.
#     - name: KUBEBOLT_UPDATE_CHECK_ENABLED
#       value: "false"
extraEnv: []
