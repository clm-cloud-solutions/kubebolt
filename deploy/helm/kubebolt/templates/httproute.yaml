{{- if .Values.gatewayAPI.enabled }}
# api.kubebolt.io → the API Service (HTTP/REST + WebSocket). WebSocket upgrade
# works over an HTTPRoute with no extra config. When the UI is served off-cluster
# (Vercel, web.enabled=false) this is the only HTTP entry point.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "kubebolt.fullname" . }}-api
  labels:
    {{- include "kubebolt.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "kubebolt.fullname" . }}
      sectionName: api-https
  hostnames:
    - {{ .Values.gatewayAPI.api.host | quote }}
  rules:
    - backendRefs:
        {{- if .Values.web.enabled }}
        - name: {{ include "kubebolt.fullname" . }}
          port: {{ .Values.service.port }}
        {{- else }}
        - name: {{ include "kubebolt.fullname" . }}-api
          port: {{ .Values.api.port }}
        {{- end }}
{{- end }}
