apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubebolt.fullname" . }}-api
  labels:
    {{- include "kubebolt.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubebolt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "kubebolt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "kubebolt.serviceAccountName" . }}
      {{- if or .Values.auth.enabled (and .Values.agentIngest.enabled .Values.agentIngest.tls.enabled) }}
      volumes:
        {{- if .Values.auth.enabled }}
        - name: data
          {{- if .Values.auth.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "kubebolt.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if and .Values.agentIngest.enabled .Values.agentIngest.tls.enabled }}
        # Sprint A: server cert (+ optional client CA for mTLS) for the
        # agent ingest channel. The Secret(s) are owned by the operator
        # — the chart never sees the cert / key bytes.
        - name: agent-ingest-tls
          projected:
            sources:
              - secret:
                  name: {{ .Values.agentIngest.tls.existingSecret | quote }}
                  items:
                    - key: tls.crt
                      path: tls.crt
                    - key: tls.key
                      path: tls.key
              {{- if .Values.agentIngest.tls.clientCASecret }}
              - secret:
                  name: {{ .Values.agentIngest.tls.clientCASecret | quote }}
                  items:
                    - key: ca.crt
                      path: ca.crt
              {{- end }}
        {{- end }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
              protocol: TCP
              name: api
            {{- if .Values.agentIngest.enabled }}
            - containerPort: {{ .Values.agentIngest.port }}
              protocol: TCP
              name: agent-ingest
            {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          env:
            # --- Authentication ---
            - name: KUBEBOLT_AUTH_ENABLED
              value: {{ .Values.auth.enabled | quote }}
            - name: KUBEBOLT_DATA_DIR
              value: "/data"
            {{- if .Values.auth.enabled }}
            {{- if .Values.auth.existingSecret }}
            - name: KUBEBOLT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: admin-password
                  optional: true
            - name: KUBEBOLT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: jwt-secret
                  optional: true
            {{- else }}
            {{- if .Values.auth.adminPassword }}
            - name: KUBEBOLT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubebolt.fullname" . }}-auth
                  key: admin-password
            {{- end }}
            {{- if .Values.auth.jwtSecret }}
            - name: KUBEBOLT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubebolt.fullname" . }}-auth
                  key: jwt-secret
            {{- end }}
            {{- end }}
            {{- end }}
            # --- AI Copilot ---
            {{- if .Values.copilot.enabled }}
            - name: KUBEBOLT_AI_PROVIDER
              value: {{ .Values.copilot.provider | quote }}
            {{- if .Values.copilot.model }}
            - name: KUBEBOLT_AI_MODEL
              value: {{ .Values.copilot.model | quote }}
            {{- end }}
            {{- if .Values.copilot.baseUrl }}
            - name: KUBEBOLT_AI_BASE_URL
              value: {{ .Values.copilot.baseUrl | quote }}
            {{- end }}
            - name: KUBEBOLT_AI_MAX_TOKENS
              value: {{ .Values.copilot.maxTokens | quote }}
            {{- if .Values.copilot.existingSecret }}
            - name: KUBEBOLT_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.copilot.existingSecret }}
                  key: api-key
            {{- else if .Values.copilot.apiKey }}
            - name: KUBEBOLT_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubebolt.fullname" . }}-copilot
                  key: api-key
            {{- end }}
            {{- if .Values.copilot.fallback.enabled }}
            - name: KUBEBOLT_AI_FALLBACK_PROVIDER
              value: {{ .Values.copilot.fallback.provider | default .Values.copilot.provider | quote }}
            {{- if .Values.copilot.fallback.model }}
            - name: KUBEBOLT_AI_FALLBACK_MODEL
              value: {{ .Values.copilot.fallback.model | quote }}
            {{- end }}
            {{- if .Values.copilot.fallback.baseUrl }}
            - name: KUBEBOLT_AI_FALLBACK_BASE_URL
              value: {{ .Values.copilot.fallback.baseUrl | quote }}
            {{- end }}
            {{- if .Values.copilot.fallback.existingSecret }}
            - name: KUBEBOLT_AI_FALLBACK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.copilot.fallback.existingSecret }}
                  key: api-key
            {{- else if .Values.copilot.fallback.apiKey }}
            - name: KUBEBOLT_AI_FALLBACK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubebolt.fullname" . }}-copilot-fallback
                  key: api-key
            {{- end }}
            {{- end }}
            {{- end }}
            {{- /* ── Agent ingest (Sprint A) ── */ -}}
            {{- if .Values.agentIngest.enabled }}
            - name: KUBEBOLT_AGENT_GRPC_ADDR
              value: "0.0.0.0:{{ .Values.agentIngest.port }}"
            - name: KUBEBOLT_AGENT_AUTH_MODE
              value: {{ .Values.agentIngest.authMode | quote }}
            - name: KUBEBOLT_AGENT_TOKEN_AUDIENCE
              value: {{ .Values.agentIngest.tokenAudience | quote }}
            {{- if .Values.agentIngest.rateLimit.enabled }}
            - name: KUBEBOLT_AGENT_RATE_LIMIT_ENABLED
              value: "true"
            - name: KUBEBOLT_AGENT_RATE_LIMIT_RPS
              value: {{ .Values.agentIngest.rateLimit.requestsPerSec | quote }}
            - name: KUBEBOLT_AGENT_RATE_LIMIT_BURST
              value: {{ .Values.agentIngest.rateLimit.burst | quote }}
            {{- end }}
            {{- if .Values.agentIngest.tls.enabled }}
            {{- if not .Values.agentIngest.tls.existingSecret }}
            {{- fail "agentIngest.tls.enabled=true requires agentIngest.tls.existingSecret" }}
            {{- end }}
            - name: KUBEBOLT_AGENT_TLS_CERT_FILE
              value: /etc/kubebolt-agent-tls/tls.crt
            - name: KUBEBOLT_AGENT_TLS_KEY_FILE
              value: /etc/kubebolt-agent-tls/tls.key
            {{- if .Values.agentIngest.tls.clientCASecret }}
            - name: KUBEBOLT_AGENT_TLS_CLIENT_CA
              value: /etc/kubebolt-agent-tls/ca.crt
            {{- end }}
            {{- if .Values.agentIngest.tls.requireClientCert }}
            {{- if not .Values.agentIngest.tls.clientCASecret }}
            {{- fail "agentIngest.tls.requireClientCert=true requires agentIngest.tls.clientCASecret" }}
            {{- end }}
            - name: KUBEBOLT_AGENT_REQUIRE_MTLS
              value: "true"
            {{- end }}
            {{- end }}
            {{- end }}
          volumeMounts:
            {{- if .Values.auth.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if and .Values.agentIngest.enabled .Values.agentIngest.tls.enabled }}
            - name: agent-ingest-tls
              mountPath: /etc/kubebolt-agent-tls
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubebolt.fullname" . }}-web
  labels:
    {{- include "kubebolt.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubebolt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "kubebolt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          env:
            - name: API_BACKEND
              value: "{{ include "kubebolt.fullname" . }}-api:{{ .Values.api.port }}"
          ports:
            - containerPort: {{ .Values.web.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
