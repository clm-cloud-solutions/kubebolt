{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubebolt.fullname" . }}
  labels:
    {{- include "kubebolt.labels" . | nindent 4 }}
rules:
  # Read access to all standard resources
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "namespaces", "services", "endpoints", "configmaps", "secrets", "persistentvolumeclaims", "persistentvolumes", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "clusterroles", "rolebindings", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  # Permission probing
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews"]
    verbs: ["create"]
  # Exec for terminal and file browser
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Write access for resource management (restart, scale, delete, edit)
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["patch", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["delete", "update"]
  {{- if and .Values.agentIngest.enabled .Values.agentIngest.rbac.enableTokenReview }}
  # Agent ingest auth (Sprint A): the BearerIngest path needs no RBAC,
  # but TokenReview validation requires create on tokenreviews. Toggle
  # off (agentIngest.rbac.enableTokenReview=false) when no agent uses
  # tokenreview mode — typical for SaaS / cross-cluster setups.
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubebolt.fullname" . }}
  labels:
    {{- include "kubebolt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubebolt.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubebolt.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
