{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubebolt.fullname" . }}
  labels:
    {{- include "kubebolt.labels" . | nindent 4 }}
rules:
  # Read access to all standard resources
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "namespaces", "services", "endpoints", "configmaps", "secrets", "persistentvolumeclaims", "persistentvolumes", "events", "serviceaccounts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "clusterroles", "rolebindings", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes"]
    verbs: ["get", "list", "watch"]
  # PodDisruptionBudgets — standard policy/v1 resource, surfaced as a
  # first-class view + insight (pdb-no-match) in 1.14. Without this grant
  # the permission probe denies it on EVERY install and the PDB view 403s.
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  # Optional CRDs surfaced as first-class read-only views in 1.14. Same
  # pattern as the gateway.networking.k8s.io grant above: harmless when the
  # CRD isn't installed (the rule matches nothing), and the moment the
  # operator adds cert-manager / ArgoCD / VPA / Cilium, KubeBolt lists them
  # with no RBAC change. Probed by SelfSubjectAccessReview at connect time.
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling.k8s.io"]
    resources: ["verticalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  # Cilium network policy CRDs. The agent's wildcard reader/operator role
  # covers these via `*/*`, but this chart's in-cluster API role enumerates
  # apiGroups explicitly, so cilium.io must be listed for the Cilium Policies
  # views to light up (matches the cilium.io probe in cluster/permissions.go).
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies", "ciliumclusterwidenetworkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  # Permission probing
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews"]
    verbs: ["create"]
  # Interactive pod subresources, both create-verb:
  #   - pods/exec       → terminal + file browser
  #   - pods/portforward → the port-forward feature. Was MISSING, so PF 403'd
  #     as the kubebolt SA on an in-cluster deploy (where the API talks to the
  #     apiserver with its own SA, not via the agent). Found in 1.14.0-rc.1
  #     validation — "cannot create resource pods/portforward".
  - apiGroups: [""]
    resources: ["pods/exec", "pods/portforward"]
    verbs: ["create"]
  # Evict-pod action (api/actions_pod.go → policy/v1 Eviction, respects PDBs).
  # The eviction subresource's authorization apiGroup has varied across k8s
  # versions (core "" vs "policy"); listing both is additive and harmless —
  # the group the apiserver actually checks matches, the other matches
  # nothing. Sibling RBAC gap to pods/portforward, found in rc.1 validation.
  - apiGroups: ["", "policy"]
    resources: ["pods/eviction"]
    verbs: ["create"]
  # Write access for resource management (restart, scale, delete, edit) AND
  # the "New resource" modal's create flow. The modal offers ~19 kinds; the
  # create verb must cover them or the apply 403s as the kubebolt SA.
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["create", "patch", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["pods", "services", "persistentvolumeclaims"]
    verbs: ["create", "update", "delete"]
  # NetworkPolicies: create/update/delete for the New-resource modal
  # (NetworkPolicy is offered as a first-class kind with starter
  # templates as of 1.11) and for YAML-tab edits + Delete action.
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "update", "delete"]
  # Remaining New-resource modal kinds (Jobs, CronJobs, Ingresses, HPAs,
  # StorageClasses) + their YAML-apply / Delete actions. The apps + core
  # create verbs are added above; configmaps/secrets/namespaces/RBAC/
  # serviceaccounts already had create. These four groups had NO write
  # rule at all — added in 1.14 so the modal's kind list matches the RBAC.
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "update", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["create", "update", "delete"]
  # ConfigMaps: agent install creates kubebolt-agent-config alongside the
  # DaemonSet; without create the wizard fails after the SA step.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "update", "delete"]
  # Secrets: create/update for the admin-password Secret persisted on
  # first boot AND for agent ingest-token Secrets created via the
  # AgentInstallWizard / AddClusterWizard "Generate token" flow.
  # Read access is already granted in the read-all rule above.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "delete"]
  # Namespaces: create for the AgentInstallWizard "Install agent" flow,
  # which creates kubebolt-system if it doesn't already exist before
  # rolling out the DaemonSet. Read is already granted above.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create"]
  # Apps + RBAC + ServiceAccounts: the AgentInstallWizard creates the
  # agent's own DaemonSet, ServiceAccount, ClusterRole, ClusterRoleBinding
  # in kubebolt-system. Without these the install button errors out
  # right after the namespace step.
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["create", "update", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings", "roles", "rolebindings"]
    verbs: ["create", "update", "delete"]
  # Privilege-escalation guard bypass: K8s rejects creating a Role with
  # permissions the creator doesn't hold ("attempting to grant RBAC
  # permissions not currently held"). The agent's metrics ClusterRole
  # needs nodes/metrics, nodes/proxy, nodes/stats which the kubebolt
  # backend itself doesn't use; rather than mirror them, grant the
  # standard `escalate` + `bind` verbs that say "this SA is an admin
  # tool that creates Roles for other workloads". Same pattern Helm,
  # ArgoCD, and operator-style tools use.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "roles"]
    verbs: ["escalate", "bind"]
  {{- if and .Values.agentIngest.enabled .Values.agentIngest.rbac.enableTokenReview }}
  # Agent ingest auth (Sprint A): the BearerIngest path needs no RBAC,
  # but TokenReview validation requires create on tokenreviews. Toggle
  # off (agentIngest.rbac.enableTokenReview=false) when no agent uses
  # tokenreview mode — typical for SaaS / cross-cluster setups.
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubebolt.fullname" . }}
  labels:
    {{- include "kubebolt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubebolt.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubebolt.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
