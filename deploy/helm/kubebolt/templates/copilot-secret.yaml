{{- if and .Values.copilot.enabled .Values.copilot.apiKey (not .Values.copilot.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubebolt.fullname" . }}-copilot
  labels:
    {{- include "kubebolt.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ .Values.copilot.apiKey | quote }}
{{- end }}
{{- if and .Values.copilot.enabled .Values.copilot.fallback.enabled .Values.copilot.fallback.apiKey (not .Values.copilot.fallback.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubebolt.fullname" . }}-copilot-fallback
  labels:
    {{- include "kubebolt.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ .Values.copilot.fallback.apiKey | quote }}
{{- end }}
