# KubeBolt test workload.
#
# Deploys a small three-tier demo into the `demo` namespace:
# - demo-web (Deployment, 3 replicas of nginx) — the server
# - demo-load (Deployment, 2 replicas) — a curl loop that keeps demo-web busy
#   so the Monitor tab has real CPU / memory / network traffic to show
# - demo-cache (StatefulSet, 2 replicas of redis) — so the StatefulSet
#   monitor also has a subject
#
# All containers declare requests + limits so reference lines render on
# the CPU and Memory charts.
#
# Apply with `make kind-testbed`, remove with `make kind-testbed-down`.

apiVersion: v1
kind: Namespace
metadata:
  name: demo

---
# Config + secret referenced by demo-web so the Config edge group has
# something to draw on the cluster map.
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-web-config
  namespace: demo
data:
  greeting: "hello from configmap"
  log_level: "info"

---
apiVersion: v1
kind: Secret
metadata:
  name: demo-web-secret
  namespace: demo
type: Opaque
stringData:
  api_token: "not-a-real-token"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web
  namespace: demo
  labels:
    app.kubernetes.io/name: demo-web
    app.kubernetes.io/component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo-web
  template:
    metadata:
      labels:
        app: demo-web
        app.kubernetes.io/name: demo-web
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: demo-web-config
            - secretRef:
                name: demo-web-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: demo-web
  namespace: demo
spec:
  selector:
    app: demo-web
  ports:
    - port: 80
      targetPort: http
      name: http

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-load
  namespace: demo
  labels:
    app.kubernetes.io/name: demo-load
    app.kubernetes.io/component: loadgen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-load
  template:
    metadata:
      labels:
        app: demo-load
        app.kubernetes.io/name: demo-load
        app.kubernetes.io/component: loadgen
    spec:
      containers:
        - name: curl
          image: curlimages/curl:8.10.1
          # Modest pacing: ~5 requests/s per pod. With 2 replicas and 3
          # backends, each nginx sees ~3 RPS — enough to move the needle
          # on the charts without cooking the kind node.
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                curl -s -o /dev/null http://demo-web.demo.svc.cluster.local/ || true
                sleep 0.2
              done
          resources:
            requests:
              cpu: 20m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 64Mi

---
apiVersion: v1
kind: Service
metadata:
  name: demo-cache
  namespace: demo
  labels:
    app: demo-cache
spec:
  clusterIP: None
  selector:
    app: demo-cache
  ports:
    - port: 6379
      name: redis

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: demo-cache
  namespace: demo
  labels:
    app.kubernetes.io/name: demo-cache
    app.kubernetes.io/component: cache
spec:
  serviceName: demo-cache
  replicas: 2
  selector:
    matchLabels:
      app: demo-cache
  template:
    metadata:
      labels:
        app: demo-cache
        app.kubernetes.io/name: demo-cache
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 30m
              memory: 48Mi
            limits:
              cpu: 150m
              memory: 96Mi
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 2
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
