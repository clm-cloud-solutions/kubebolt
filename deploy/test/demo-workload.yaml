# KubeBolt test workload.
#
# Deploys a small three-tier demo into the `demo` namespace:
# - demo-web (Deployment, 3 replicas of nginx) — the server
# - demo-load (Deployment, 2 replicas) — a curl loop that keeps demo-web busy
#   so the Monitor tab has real CPU / memory / network traffic to show
# - demo-cache (StatefulSet, 2 replicas of redis) — so the StatefulSet
#   monitor also has a subject
#
# All containers declare requests + limits so reference lines render on
# the CPU and Memory charts.
#
# Apply with `make kind-testbed`, remove with `make kind-testbed-down`.

apiVersion: v1
kind: Namespace
metadata:
  name: demo

---
# Config + secret referenced by demo-web so the Config edge group has
# something to draw on the cluster map.
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-web-config
  namespace: demo
data:
  greeting: "hello from configmap"
  log_level: "info"

---
apiVersion: v1
kind: Secret
metadata:
  name: demo-web-secret
  namespace: demo
type: Opaque
stringData:
  api_token: "not-a-real-token"

---
# Nginx config with deterministic status-code paths. Used by demo-web
# so the L7 edge coloring in the cluster map can be exercised without
# waiting for a real failure (curl http://demo-web/err500 etc.).
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-web-nginx
  namespace: demo
data:
  default.conf: |
    server {
      listen 80 default_server;
      server_name _;

      location / {
        add_header Content-Type text/plain;
        return 200 "ok\n";
      }

      # Deterministic error paths for L7 observability demos. Hit any
      # of these from demo-load to force a status-class change on the
      # corresponding edge in Traffic mode.
      location /err500 { return 500; }
      location /err502 { return 502; }
      location /err503 { return 503; }
      location /nope   { return 404; }
    }

---
# Enables Cilium L7 (HTTP) visibility for ingress on demo-web. Without
# this, Hubble only surfaces L3/L4 events and the agent can't emit
# pod_flow_http_requests_total — so the cluster map falls back to
# verdict-based coloring. The empty `http: - {}` rule means "parse
# traffic as HTTP but don't restrict anything".
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: demo-web-http-visibility
  namespace: demo
spec:
  endpointSelector:
    matchLabels:
      app: demo-web
  ingress:
    - toPorts:
        - ports:
            - port: "80"
              protocol: TCP
          rules:
            http:
              - {}

---
# External routing for demo-web via ingress-nginx. Only useful when
# `kubectl apply -f https://…/ingress-nginx/deploy/static/provider/cloud/deploy.yaml`
# has been applied first; `make demo-ingress-install` bundles both.
# Access from the host after starting a port-forward, e.g.
#   kubectl -n ingress-nginx port-forward svc/ingress-nginx-controller 8080:80
#   curl -H 'Host: demo.localhost' http://localhost:8080/
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-web
  namespace: demo
spec:
  ingressClassName: nginx
  rules:
    - host: demo.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-web
                port:
                  name: http

---
# L7 visibility for ingress-nginx pods too, so requests that arrive
# from outside the cluster are parsed and the ingress → demo-web edge
# in Traffic mode shows HTTP status classes / latency. Without this
# CNP the ingress-nginx side only emits L4 flow events.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ingress-nginx-http-visibility
  namespace: ingress-nginx
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
      app.kubernetes.io/component: controller
  ingress:
    - toPorts:
        - ports:
            - port: "80"
              protocol: TCP
          rules:
            http:
              - {}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web
  namespace: demo
  labels:
    app.kubernetes.io/name: demo-web
    app.kubernetes.io/component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo-web
  template:
    metadata:
      labels:
        app: demo-web
        app.kubernetes.io/name: demo-web
        app.kubernetes.io/component: frontend
    spec:
      volumes:
        - name: nginx-conf
          configMap:
            name: demo-web-nginx
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: demo-web-config
            - secretRef:
                name: demo-web-secret
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: demo-web
  namespace: demo
spec:
  selector:
    app: demo-web
  ports:
    - port: 80
      targetPort: http
      name: http

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-load
  namespace: demo
  labels:
    app.kubernetes.io/name: demo-load
    app.kubernetes.io/component: loadgen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-load
  template:
    metadata:
      labels:
        app: demo-load
        app.kubernetes.io/name: demo-load
        app.kubernetes.io/component: loadgen
    spec:
      containers:
        - name: curl
          image: curlimages/curl:8.10.1
          # Modest pacing: ~5 requests/s per pod. With 2 replicas and 3
          # backends, each nginx sees ~3 RPS — enough to move the needle
          # on the charts without cooking the kind node.
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                curl -s -o /dev/null http://demo-web.demo.svc.cluster.local/ || true
                sleep 0.2
              done
          resources:
            requests:
              cpu: 20m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 64Mi

---
apiVersion: v1
kind: Service
metadata:
  name: demo-cache
  namespace: demo
  labels:
    app: demo-cache
spec:
  clusterIP: None
  selector:
    app: demo-cache
  ports:
    - port: 6379
      name: redis

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: demo-cache
  namespace: demo
  labels:
    app.kubernetes.io/name: demo-cache
    app.kubernetes.io/component: cache
spec:
  serviceName: demo-cache
  replicas: 2
  selector:
    matchLabels:
      app: demo-cache
  template:
    metadata:
      labels:
        app: demo-cache
        app.kubernetes.io/name: demo-cache
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 30m
              memory: 48Mi
            limits:
              cpu: 150m
              memory: 96Mi
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 2
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
