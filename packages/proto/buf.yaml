version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  except:
    # KubeBolt's internal wire uses domain-semantic message names
    # (MetricBatch, IngestAck, ...) rather than the Google-style
    # <RpcName>Request / <RpcName>Response pattern.
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
    # Single-service package; the "Service" suffix is redundant.
    - SERVICE_SUFFIX
breaking:
  use:
    - FILE
